    field_id: oil_based_focus
    kind: trigger
    field_text: >-
      ## 2. Why we focus on oil-based decorative paint


      - Oil-based (solvent-based) paints often contain lead compounds added as **drying agents** and **colour
      pigments**.

      - These paints are most often used on metal surfaces, doors, window frames, furniture, and — critically —
      children's play equipment.

      - Water-based (emulsion) paints generally contain little or no added lead, so they are NOT the focus of this
      survey.

      - Your job is to find and document the oil-based decorative paints that are sold in your country.
