    field_text: >-
      ## 4. Handling a refusal


      Some sellers will say no. That is their right.


      - Thank them politely for their time. Do not argue, plead, or offer extra incentives.

      - Do not show disappointment.

      - Make a quick note on your phone of the shop name (if visible) so you do not return.

      - Move on to the next shop on your list.


      If a seller agrees to talk but refuses one specific question during the interview, that is also fine — record
      their refusal in the form (you will learn how in Module 3) and move to the next question.
