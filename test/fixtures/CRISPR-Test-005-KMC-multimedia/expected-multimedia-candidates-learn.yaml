    field_id: neutral_framing
    kind: trigger
    field_text: >-
      ## Before you begin: how to ask the questions


      - **Be neutral.** Do not lead the seller toward an answer. Ask the question, then stop talking and listen.

      - **Don't anchor.** If the seller's first answer is brand X, do not assume the rest of the answer is also about
      brand X. Probe gently: *"Are there other brands?"*

      - **Capture exact words for "don't know" and "declined".** If the seller says they don't know, write **"don't
      know"** in the answer field. If they refuse to answer, write **"declined"**. **Never invent or guess.**

      - **Long answers are OK.** The form has free-text fields. Your phone's voice-to-text feature works in those fields
      and is the fastest way to capture long answers. (Voice-to-text is your phone's feature, not part of CommCare.)

      - **Probing is encouraged.** Use phrases like *"Can you tell me more?"*, *"What else?"*, *"Why is that?"* — these
      are neutral.

      - **Avoid leading phrases** like *"So you mostly sell brand X, right?"* That puts an answer in the seller's mouth.
