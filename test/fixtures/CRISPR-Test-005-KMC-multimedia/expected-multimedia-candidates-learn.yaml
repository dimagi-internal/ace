    field_id: health_context
    kind: trigger
    field_text: >-
      ## 1. Lead in paint is a serious health problem


      - Lead in decorative paints is a major source of childhood lead exposure worldwide.

      - Children are most at risk: lead damages their developing brains, lowers IQ, and causes lifelong learning and
      behaviour problems.

      - Even small amounts of lead are harmful. There is **no safe level** of lead exposure for a child.

      - When old paint chips, peels, or turns to dust, children swallow or breathe it in — especially from toys,
      furniture, walls, and play equipment.
