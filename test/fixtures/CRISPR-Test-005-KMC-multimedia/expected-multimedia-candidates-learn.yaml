    field_id: in_scope_shop
    kind: trigger
    field_text: >-
      ## 1. What counts as an in-scope shop


      A shop is **in scope** if it sells **oil-based decorative paint** to **retail customers** — that is, ordinary
      people walking in off the street, painters buying for a job, or small contractors.


      - It is fine if the shop also sells water-based paints, brushes, or other hardware.

      - A shop that ONLY sells industrial paints to factories is **out of scope**.

      - A shop that ONLY sells water-based emulsion paints is **out of scope**.

      - A wholesaler who refuses to sell single cans to walk-in customers is **out of scope**.


      If you are unsure, politely ask: *"Do you sell oil-based paints to individual customers?"* If yes, the shop is in
      scope.
