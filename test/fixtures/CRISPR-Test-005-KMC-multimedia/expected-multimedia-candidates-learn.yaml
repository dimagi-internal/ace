    field_text: >-
      ## 2. How to approach the seller


      - Dress neatly. You represent a research project.

      - Walk in calmly. Greet the shopkeeper using the local greeting.

      - Ask politely to speak to **the owner or the most knowledgeable seller** — someone who can answer questions about
      brands, suppliers, and customers.

      - Wait until they are not serving another customer. Be patient.

      - Be friendly but professional. You are not there to make small talk for an hour.
