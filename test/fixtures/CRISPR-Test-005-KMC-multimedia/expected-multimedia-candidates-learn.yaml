  Exposure Elimination Project) to visit decorative-paint shops in low- and middle-income countries, interview
  shopkeepers in modest settings, and purchase a small sample of paint cans for laboratory analysis. People should be
  dressed modestly. All of the users and participants should be representative of the context — neighborhood paint shops
  in countries where lead-pigment regulations are weak (think shopfronts in South Asia, sub-Saharan Africa, or Latin
  America), with shopkeepers, painters, and field workers shown realistically rather than idealized.
