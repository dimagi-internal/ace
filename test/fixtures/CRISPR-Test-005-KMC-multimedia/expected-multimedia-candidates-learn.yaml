    field_text: |-
      ## 3. What LEEP will do with the data

      - LEEP (the Lead Exposure Elimination Project) will send the cans you purchase to a laboratory.
      - The lab will measure the lead content of each can.
      - LEEP uses these results to:
        - Show governments and regulators the true scale of lead in paint sold today.
        - Push for enforceable lead-paint standards.
        - Work with manufacturers to reformulate their products.
      - **Your fieldwork is the foundation of this advocacy.** Without your data, none of it is possible.
