name: Version bump check

on:
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION was bumped
        run: |
          PR_VERSION=$(cat VERSION | tr -d '[:space:]')
          MAIN_VERSION=$(git show origin/main:VERSION | tr -d '[:space:]')

          echo "PR version:   $PR_VERSION"
          echo "Main version: $MAIN_VERSION"

          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo ""
            echo "::error::VERSION file was not bumped. Update VERSION before merging."
            echo ""
            echo "Current main version: $MAIN_VERSION"
            echo "Bump to the next patch/minor/major as appropriate."
            exit 1
          fi

          # Verify it's a valid semver and actually higher
          IFS='.' read -r pr_major pr_minor pr_patch <<< "$PR_VERSION"
          IFS='.' read -r main_major main_minor main_patch <<< "$MAIN_VERSION"

          if [ "$pr_major" -lt "$main_major" ] 2>/dev/null || \
             ([ "$pr_major" -eq "$main_major" ] && [ "$pr_minor" -lt "$main_minor" ]) 2>/dev/null || \
             ([ "$pr_major" -eq "$main_major" ] && [ "$pr_minor" -eq "$main_minor" ] && [ "$pr_patch" -le "$main_patch" ]) 2>/dev/null; then
            echo ""
            echo "::error::VERSION ($PR_VERSION) is not higher than main ($MAIN_VERSION)."
            exit 1
          fi

          echo ""
          echo "✓ Version bump verified: $MAIN_VERSION → $PR_VERSION"
