    \ skipping clone test');\n      return;\n    }\n    const ctx = await session.getContext();\n\
    \    const csrfToken = session.getCsrfToken();\n    // Mirror the production RequestFn\
    \ shape from mcp/ocs-server.ts so the\n    // backend's body-encoding hints (formEncoded\
    \ / multipart) round-trip\n    // correctly. Without formEncoded, Django form\
    \ views fall through to a\n    // deceptively-successful 200 that silently fails\
    \ downstream.\n    const request: RequestFn = async (method, url, body, options)\
    \ => {\n      const maxRedirects = options?.followRedirects === false ? 0 : undefined;\n\
    \      const headers = { 'X-CSRFToken': csrfToken, Referer: baseUrl };\n     \
    \ let res;\n      if (method === 'GET') {\n        res = await ctx.request.get(url,\
    \ { maxRedirects });\n      } else if (options?.multipart) {\n        res = await\
    \ ctx.request.post(url, { headers, multipart: options.multipart, maxRedirects\
    \ });\n      } else if (options?.formEncoded) {\n        res = await ctx.request.post(url,\
    \ { headers, form: body as Record<string, string>, maxRedirects });\n      } else\
    \ {\n        res = await ctx.request.post(url, { headers, data: body, maxRedirects\
    \ });\n      }\n      return {\n        ok: res.ok(),\n        status: res.status(),\n\
    \        headers: res.headers(),\n        text: async () => await res.text(),\n\
    \        json: async () => await res.json(),\n      };\n    };\n    const backend\
    \ = new PlaywrightBackend({ teamSlug, baseUrl, csrfToken, request });\n\n    const\
    \ name = `ACE - integration-test-${Date.now()}`;\n    const cloned = await backend.cloneChatbot({\
    \ template_id: templateId, new_name: name });\n    expect(cloned.experiment_id).toBeGreaterThan(0);\n\
    \    expect(cloned.public_id).toMatch(/[0-9a-f-]{36}/);\n\n    // Clean up: archive\
    \ the cloned chatbot\n    await ctx.request.post(`/a/${teamSlug}/chatbots/${cloned.experiment_id}/delete/`,\
    \ {\n      headers: { 'X-CSRFToken': csrfToken, Referer: baseUrl },\n    });\n\
    \  })"
