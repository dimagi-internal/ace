# Connect APK 2.63.0 selector map
#
# PARTIAL CALIBRATION (status 2026-06-01). Originally copied verbatim from
# connect-2.62.0.yaml when the AMI bumped CommCare 2.62.0 → 2.63.0. Surfaces
# calibrated live on a 2.63.0 device SINCE the copy (rows carrying a
# `Live-verified …` note in `purpose:`): jobs-list / opp-detail cluster
# (#663, 2026-06-01; re-confirmed via read-only snapshot the same day),
# in-form camera (#593), deliver-side ids (#526), and the login/register/
# learn ids promoted off raw literals by #650/#665, then 3 registration rows
# (name-continue, message-button, backup-code-view) live-verified by the
# 2026-06-01 cold-boot registration walk (selector-map-calibrate). Rows still
# flagged `unverified: true` (11 as of 2026-06-01: cold-start, learn-home,
# login button, OTP-confirm, form-entry, quiz-result, start-delivering) are
# best-guesses pending a live walk of those states (states 6–10 need a
# Learn-incomplete opp — a fresh /ace:run). The static recipes are now migrated
# off raw ids (#665) EXCEPT connect-register-from-otp.yaml's 7 camera ids
# (the #666 photo surface, deliberately raw pending live calibration).
# Rows WITHOUT either an `unverified: true` flag OR a `Live-verified` note
# are inherited 2.62.0 values not yet independently confirmed on 2.63.0 —
# treat with mild caution.
#
# To FINISH calibration, run the systematic state-walk:
#     /ace:step selector-map-calibrate
# It cold-boots a fresh device (states 1-5) + uses a Learn-incomplete opp for
# the Learn/Deliver states (6-10), harvests ui-dumps
# via scripts/probe-atlas-drift.ts, promotes/corrects rows, migrates recipes
# off raw ids, and re-validates on-device. This is the skill the
# `selector_map_currency` doctor probe points at — NOT
# connect-baseline-screenshots (that only captures training PNGs). See
# docs/learnings/2026-06-01-selector-map-calibration-framework.md.
#
# Original 2.62.0 header below:
# Connect APK 2.62.0 selector map
#
# Maps stable LOGICAL NAMES (used in static + generated recipes) to the
# concrete Maestro selectors that resolve them in this APK version. When the
# Connect APK ships a new version, copy this file to
# `connect-<new-version>.yaml`, run `connect-baseline-screenshots` to detect
# selector drift, and update only the rows that changed. Recipes that
# reference logical names via `${SELECTOR:logical-name}` keep working
# without edits.
#
# Conventions:
# - PREFER text-anchor matchers — they survive minor APK rebuilds where
#   resource-ids change but visible labels don't.
# - Use `id:` only when the text is dynamic, the surface has multiple
#   buttons with the same text, or when the static recipes already proved
#   the resource-id is stable across builds.
# - Logical names are kebab-case scoped by surface: `<surface>-<element>`.
#   E.g., `nav-drawer-sign-in`, `opp-detail-start-learning`,
#   `form-question-next-button`.
#
# To resolve placeholders in a recipe body, call
# `mobile_resolve_selectors({yaml, apk_version})`. The MCP atom reads this
# file (or the version the caller passes) and substitutes
# `${SELECTOR:logical-name}` with the matcher block below.
#
# Substitution shape:
#   `${SELECTOR:nav-drawer-sign-in}` →
#       (when type=id)   `id: "org.commcare.dalvik:id/nav_drawer_sign_in_button"`
#       (when type=text) `text: "Start Learning"`
#       (when type=both) `id: "org.commcare.dalvik:id/btn_start"  # text fallback: "Start"`
#
# INTENTIONALLY ABSENT — generic-positional selectors
# -----------------------------------------------------------------------------
# This map deliberately does NOT define `radio-first-option`,
# `radio-first-answer`, `single-select-option-N`, `option-1`, or any other
# generic-positional selector for form-question answer rows. Recipe
# authors MUST emit literal `tapOn: text: "<option label>"` matchers
# using the option labels read from Nova's `get_form` response — that
# string is the canonical, drift-stable handle to a specific answer.
#
# Reasoning: generic-positional placeholders hide which answer is being
# selected, silently drift when option ordering changes between Nova
# rebuilds, and pass `mobile_validate_recipe` (syntactic) while
# producing recipes that either (a) fail at Step 3.4's
# `mobile_resolve_selectors` gate when the row is absent, or (b) fail
# at runtime on the live AVD when a brittle positional row IS present.
#
# The forcing function for recipe authors lives in
# `skills/app-test-cases/SKILL.md § Quiz / required-input answer-tap
# rule — MANDATORY`. The skill update was a class-level fix that
# accompanied this comment block (PR following malaria-rdt run
# 20260522-1002 Phase 6 BLOCKER, 2026-05-22).

