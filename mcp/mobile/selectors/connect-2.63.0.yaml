  # ── Photo capture ──────────────────────────────────────────────
  # LIVE-CALIBRATED 2026-05-31 (jjackson/ace#593) against malaria-rdt
  # run 20260531-0739, ACE_Pixel_API_34, CommCare 2.63.0. The full
  # in-form photo walk was driven live: tap "TAKE PICTURE" → AOSP camera
  # opens → shutter → intent-review tray → "Done". UI dumps captured at
  # each surface; resource-ids below are transcribed from those dumps
  # (NOT guessed). The camera app is the SEPARATE package
  # `com.android.camera2`; the in-form entry button is in
  # `org.commcare.dalvik`. Confirmed the prior `org.commcare.dalvik:id/
  # camera_shutter_button` / `save_photo_button` guesses were WRONG
  # (wrong package + wrong id).
  camera-take-photo:
    type: text
    value: "TAKE PICTURE"
    purpose: "In-form image-capture entry button on a CommCare 2.63.0 photo question (text button, no resource-id; launches the system camera com.android.camera2 via ACTION_IMAGE_CAPTURE). Live-verified #593. Gallery alternative is the 'CHOOSE IMAGE' text button."

  camera-shutter-button:
    type: id
    value: "com.android.camera2:id/shutter_button"
    purpose: "Shutter button in the AOSP camera app (com.android.camera2) opened from the CommCare 'TAKE PICTURE' button. content-desc='Shutter', full-width bottom bar. Live-verified 2026-05-31 #593 (was a wrong-package guess org.commcare.dalvik:id/camera_shutter_button)."

  camera-save-photo:
    type: id
    value: "com.android.camera2:id/done_button"
    purpose: "Use-photo / Done button on the camera intent-review tray (com.android.camera2:id/bottombar_intent_review) shown after the shutter fires. content-desc='Done'. Returns the captured image to the CommCare form. Live-verified 2026-05-31 #593 (was a wrong guess org.commcare.dalvik:id/save_photo_button). Siblings on the same tray: camera-retake-photo, camera-cancel-photo."

  camera-retake-photo:
    type: id
    value: "com.android.camera2:id/retake_button"
    purpose: "Retake button on the camera intent-review tray (content-desc='Retake'). Discards the capture and returns to the live camera. Live-verified 2026-05-31 #593."

  camera-cancel-photo:
    type: id
    value: "com.android.camera2:id/cancel_button"
    purpose: "Cancel button on the camera intent-review tray (content-desc='Cancel'). Aborts capture and returns to the CommCare form with no image set. Live-verified 2026-05-31 #593."

  # ── Geopoint (GPS) — NOTE, not a selector ──────────────────────
  # jjackson/ace#593 anticipated an "accuracy-gated geopoint" native
  # widget needing a Capture button + emulator mock-location fix. Live
  # observation 2026-05-31 (malaria-rdt RDT Sample form): the "GPS
  # location" question is a PLAIN android.widget.EditText (no resource-id,
  # NAF) — a free-text field. The "reach 25 m / 50 m max" wording is the
  # question HINT, and the value is typed as a "lat lon alt accuracy"
  # string (e.g. "12.0022 8.5920 500 10"); the accuracy gate is an XForm
  # constraint on the typed value, not a widget. There is therefore NO
  # native-geopoint logical selector to calibrate for this form shape.
  # If a future Nova form uses a real CommCare geopoint widget (with a
  # Capture button), add its selector here and dump it live first.

  # ── Post-claim Learn-app surfaces (atlas-verified 2026-05-14) ──────
  # These selectors were calibrated against ACE_Pixel_API_34_PS on the
  # turmeric run 20260513-2243 retry. See docs/mobile-atlas/connect-2.62.0.md
  # §§ 5-7 for the full screen-by-screen ground truth.

  learn-home-start-tile:
    type: text
    value: "Start"
    purpose: "The green 'Start' tile on StandardHomeActivity (CommCare app home, post-claim, post-CCZ-install). Atlas §5. Tapping launches MenuActivity showing the Learn-app's suite root. Maestro walks up the hierarchy from the TextView (`card_text`) to find the clickable RelativeLayout (`card`); text-match works without needing the parent's resource-id."

  learn-home-sync-tile:
    type: text
    value: "Sync with Server"
    purpose: "The blue 'Sync with Server' tile on StandardHomeActivity. Atlas §5. Tapping triggers a CCHQ sync (uploads any submitted forms, downloads any pending). Used by `app-test-cases` recipes after a form sequence to upload before moving on."

  learn-suite-row-by-name:
    type: text
    value: "${MODULE_NAME}"  # caller substitutes
    purpose: "A row in the MenuActivity `screen_suite_menu_list` ListView. Atlas §6. The row's parent LinearLayout is `clickable=true`; the inner `row_txt` TextView (which carries the visible label) is NOT clickable, so Maestro walks up to the LinearLayout to perform the tap. Use this selector for: (a) the suite root row (e.g. 'Turmeric Market Survey — Learn'), (b) each form row inside a module (e.g. '1. Why we are doing this', 'Final assessment'). Composer substitutes ${MODULE_NAME} at recipe-resolution time."

  form-nav-next:
    type: id
    value: "org.commcare.dalvik:id/nav_btn_next"
    purpose: "Right-edge ImageButton (arrow icon, no text) on FormEntryActivity. Atlas §7. Advances to the next question; on the LAST question of a form, the same tap auto-finalizes + submits the form locally and returns to StandardHomeActivity. NOT a text-matched selector — the button has no text attribute, only the resource-id."

  form-nav-prev:
    type: id
    value: "org.commcare.dalvik:id/nav_btn_prev"
    purpose: "Left-edge ImageButton (X icon on Q1, arrow icon thereafter) on FormEntryActivity. Atlas §7. Goes back one question. On Q1, tapping equates to 'exit form without saving' — typically halts the recipe."

  form-nav-finish:
    type: id
    value: "org.commcare.dalvik:id/nav_btn_finish"
    purpose: "FINISH button on the LAST screen of a multi-screen form finalize. Empirically confirmed on bednet-spot-check/20260529-1124: a SCORE-GATED quiz (a single-question quiz with a score-conditional result label) does NOT auto-finalize on nav_btn_next — answering advances to a result-label screen whose FINISH button (this selector) submits + syncs the form ('Form successfully completed' toast → StandardHomeActivity → '1 form sent to server!'). Distinct from form-nav-next's last-question auto-finalize (plain content forms). Recipes that walk a score-gated quiz MUST press this on the result screen, or the assessment never submits and Connect never unlocks Deliver (#569)."

  form-required-warning:
    type: id
    value: "org.commcare.dalvik:id/warning_root"
    purpose: "Red banner that appears when `nav_btn_next` is tapped on a required-input question with no answer selected. Inner `id/message` TextView text 'Sorry, this response is required!' (atlas §7). Useful as a structural assertNotVisible after answering — confirms the answer registered before advancing."

