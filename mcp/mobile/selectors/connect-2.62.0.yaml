    value: "New Opportunities"
    purpose: "Section header on Connect home — stable text anchor; survives APK rebuilds"

  home-opportunities-tab:
    type: text
    value: "Opportunities"
    purpose: "Bottom-nav 'Opportunities' tab"

  # ── Opportunity list / detail ───────────────────────────────────
  opp-list-view-opportunity-button:
    type: id
    value: "org.commcare.dalvik:id/btn_view_opportunity"
    purpose: "View Opportunity button on each card in the unclaimed-opp list"

  opp-detail-start:
    type: id
    value: "org.commcare.dalvik:id/btn_start"
    purpose: "Pre-claim 'Start' button on the opp-detail page. CONFIRMED 2026-04-30 against ACE_Pixel_API_34_PS turmeric opp: button text is just 'Start' (not 'Start Learning'). RE-CONFIRMED 2026-04-30 round 4: tap is REGISTERED by Maestro (status pass) but NO surface transition occurs — same blocker as WARN-FLW-START-LEARNING-RETRY-NEEDED. Multiple consecutive taps + sync produce no toast, no snackbar, no screen change. The btn_start tap silently no-ops at the FLW-client layer. This is NOT a recipe-calibration issue; needs CommCare-client-side investigation (logs, sync state, Learn-app materialization). Recipe layer is unblocked once this is fixed."

  opp-learn-modules-list:
    type: id
    value: "org.commcare.dalvik:id/tv_learn_modules_list"
    purpose: "Pre-claim Learn-Details preview TextView on the opp-detail page. CONFIRMED 2026-04-30 against ACE_Pixel_API_34_PS turmeric opp: renders as a single TextView with text like '1. Form walkthrough' (concatenated newline-joined modules), NOT a RecyclerView of tappable cards. Module cards live behind a separate post-claim Learn-app surface that this selector does NOT reach."

  # ── Photo capture ──────────────────────────────────────────────
