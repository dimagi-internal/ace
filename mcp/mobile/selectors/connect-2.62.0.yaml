  opp-detail-start-learning:
    type: text
    value: "Start Learning"
    unverified: true
    purpose: "Start Learning button on the post-claim opp-detail. NOT YET REACHED in 2026-04-30 calibration — the test user's opp click on btn_start did not visibly transition the surface in the available session window, so the post-claim surface was not captured live. Best-guess label retained until a successful claim run reaches it."

