# Drive a claimed opportunity from the post-claim handoff state through
# the StandardHomeActivity Start tile into the Learn-app's MenuActivity
# suite root.
#
# Pre-state: post-`btn_start` transition completed; device is on
# StandardHomeActivity (the CommCare app home with 4 tiles: Start, View
# Job Status, Sync with Server, Log out of CommCare). The recipe author
# enters this state when `connect-claim-opp.yaml` has finished, fired
# `btn_start`, and the Learn CCZ download completed (`Downloading
# Learn App` progress screen auto-advanced).
#
# Post-state: MenuActivity showing the Learn-app's suite root (1+ rows
# in `screen_suite_menu_list`, each a tappable LinearLayout containing
# `row_img` + `row_txt`).
#
# Atlas reference: docs/mobile-atlas/connect-2.62.0.md §§ 5-6.
appId: org.commcare.dalvik
---
# StandardHomeActivity gives us 4 tiles. We want the green Start tile.
- extendedWaitUntil:
    visible:
      ${SELECTOR:learn-home-start-tile}
    timeout: 30000
- takeScreenshot: "learn-launch-home-tiles"

# Detect the "Failed to start learning" failure mode early. Connect
# surfaces this banner within ~2 seconds when its CCHQ Learn-app fetch
# fails — typically (a) the API key user lacks app-edit access on the
# released build, (b) the released CCZ format mismatches what Connect
# expects, or (c) Connect cached stale Learn-app metadata from a
# prior run. Without this assertion the recipe would time out 30s
# later on `extendedWaitUntil(modules-list)` with no diagnostic clue.
# Tracking: jjackson/ace#115 finding 1.
- assertNotVisible:
    text: "Failed to start learning"

# Tap the Start tile. Maestro walks up the hierarchy from the
# `card_text` TextView to the clickable `card` RelativeLayout
# (the TextView itself is not clickable; only the parent card is).
- tapOn:
    ${SELECTOR:learn-home-start-tile}

# Landing surface: MenuActivity (suite root). Anchor is a single row
# containing the app's display name (e.g. "Turmeric Market Survey — Learn").
# The exact text varies per opp; using the structural anchor (the
# ListView itself) keeps the recipe opp-agnostic.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/screen_suite_menu_list"
    timeout: 15000
- takeScreenshot: "learn-launch-suite-root"
