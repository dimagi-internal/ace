# Fully calibrated against CommCare 2.62.0 on ACE_Pixel_API_34_PS,
# 2026-04-30. Driven end-to-end with ${ACE_E2E_PHONE} (originally
# +74260000100; see CHANGELOG/learnings for any subsequent rotation)
# invited via `connect_send_flw_invite` after
# `connect_finalize_opportunity`.
#
# Discovery loop notes:
# - Post-registration the user lands on CommCare's "Welcome" screen
#   (resource-id screen_first_start_main) with a nav drawer that includes
#   an "Opportunities" item. Tapping that item triggers a system
#   "Unlock PersonalID" credential prompt (BiometricPrompt with device-
#   credential fallback) — the answer is the registration PIN. The
#   recipe will need to handle this prompt; selector is
#   com.android.systemui:id/lockPassword.
# - The opp-list screen is `connect_fragment_jobs_list` with an
#   `rvJobList` RecyclerView. Empty-state shows `connect_no_jobs_text`.
# - The toolbar exposes `action_sync` (top-right) and `action_bell`.
# Required env vars (pass via `mobile_run_recipe.envVars`):
#   PIN      — 4-digit device PIN for the ACE test user
#              (from `${ACE_E2E_PIN}` in $CLAUDE_PLUGIN_DATA/.env)
#   OPP_NAME — display name of the opportunity to claim. Must match the
#              substring rendered on the opp card in
#              `connect_fragment_jobs_list`. With multiple claimed opps
#              (e.g. a real run alongside stale dogfood opps from prior
#              runs), tapping the first card grabs whichever sorts
#              first — silently the wrong one. Pinning to text avoids
#              that. Tracking: jjackson/ace#115 finding 4.
#
#              **READ verbatim from
#              `run_state.yaml.phases.connect-setup.products.connect.opportunity.name`**
#              (written by Phase 4 `connect-opp-setup` at opp-create
#              time). NEVER compose from slug pieces — the live tile
#              text uses an em-dash (U+2014) like `"Malaria ITN FGD —
#              malaria-itn-fgd (run 20260515-1645)"`, while
#              slug-reassembly would produce `"ai-demo-space -
#              malaria-itn-fgd (run 20260515-1645)"` (ASCII hyphen,
#              wrong prefix). Fallback only if the field is missing
#              (legacy runs): `connect_get_opportunity({org_slug,
#              opportunity_id}).name`.
appId: org.commcare.dalvik
---
# Two valid starting surfaces after connect-login.yaml:
#   (a) screen_first_start_main with nav drawer (cold-launch with prior session)
#   (b) connect_fragment_jobs_list directly (warm post-login state)
#
# Branch (a): if first-start is visible, navigate via nav drawer + handle
# the OS lockPassword unlock.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/screen_first_start_main"
    commands:
      - tapOn:
          text: "Opportunities"
      - runFlow:
          when:
            visible:
              id: "com.android.systemui:id/lockPassword"
          commands:
            - tapOn:
                id: "com.android.systemui:id/lockPassword"
            - inputText: ${PIN}
            - pressKey: Enter

# Either branch lands us on the jobs list. CONFIRMED 2026-04-30 round 4:
# post-connect-login.yaml lands directly on connect_fragment_jobs_list
# without screen_first_start_main, so branch (a) above correctly skips.
- assertVisible:
    id: "org.commcare.dalvik:id/connect_fragment_jobs_list"

# Wait for the jobs list to populate any opp card (any of resume / view).
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/rvJobList"
    timeout: 15000
- takeScreenshot: "claim-opp-list"

# Sync the jobs list BEFORE searching for the target tile (#628).
#
# A restored AVD snapshot (the cloud backend's AMI cold-boot, and any
# local snapshot-load) carries the Connect jobs list as of snapshot
# time — which predates THIS run's Phase-4 invite. So the fresh-run opp
# is genuinely ABSENT from the list (not merely below the fold), and the
# `scrollUntilVisible text: ${OPP_NAME}` below would scroll to the bottom
# and time out on a tile that was never pulled. An in-app sync (toolbar
# `action_sync`, content-desc "Sync") pulls the current invite set so the
# tile renders. Live reproducer: bednet-spot-check/20260601-0651 Phase 6
# claim — opp tile not on-device until a manual in-app sync.
#
# `optional: true` on the tap: a warm post-login surface may land
# already-synced, or the toolbar may momentarily re-render; a missing
# `action_sync` must NOT abort the claim (the title-scroll below still
# runs). The fixed settle lets the server pull + RecyclerView re-render
# land before we start scrolling; the existing 20s scroll timeout gives
# additional buffer if the pull is still in flight.
- tapOn:
    id: "org.commcare.dalvik:id/action_sync"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: "claim-opp-list-synced"

# THE CARD-IDENTITY PROBLEM (re-authored 2026-05-15, v0.13.237 candidate):
#
# The ACE test user accumulates invites across every /ace:run; on a real
# dogfood machine `rvJobList` shows ~15-20 cards. Cards have NO per-tile
# UUID identifier (verified live 2026-05-15 turmeric run 20260515-0536
# UI dump): every card uses the same `tvTitle` / `btn_resume` /
# `btn_view_opportunity` resource-ids; no `content-desc` or `tag`
# carries the opp UUID. The ONLY discriminator is the title text in
# `tvTitle`.
#
# The list is segmented into "In Progress" (cards with `btn_resume` +
# `btn_view_info`) and "New Opportunities" (cards with
# `btn_view_opportunity`). An opp moves into "In Progress" the moment
# the user taps Start once and the Learn CCZ download begins — even
# 0% / 14% counts as in-progress.
#
# This means a recipe that "claims" the opp has TWO branches based on
# which section the target opp lives in:
#   - If it's a fresh "New Opportunities" tile: tap btn_view_opportunity
#     → opp-detail screen → tap btn_start → wait for Learn home.
#   - If it's already in "In Progress" (e.g. a prior attempt of the
#     same recipe progressed past Start): tap btn_resume → jumps
#     directly to opp-detail or Learn home (Connect remembers state).
#
# Earlier versions assumed always-`btn_view_opportunity` and used
# `below: text: ${OPP_NAME}` to scope to the target card. That broke
# silently when the target card was in In-Progress: the title-text
# anchor matched the in-progress card (it has tvTitle), but the
# nearest `btn_view_opportunity` BELOW that y-coord was on an
# UNRELATED downstream card in New Opportunities — so we'd tap into
# a wrong opp's content. Discovered 2026-05-15 turmeric run
# 20260515-0536 attempt 5: claimed an unrelated opp with 9 modules
# instead of this run's 7-module opp. Root cause was correct
# title-substring match + wrong button scoping.
#
# FIX: branch on which button is present below the matched title.
# Both branches scope `below: text: ${OPP_NAME}` so we always act on
# the target card, not a sibling.
#
# Whole-label match, NOT substring: Maestro's `text:` matches the
# ENTIRE element label as an (unanchored-looking but) full-string regex
# — a partial title does NOT match. Verified live 2026-06-01: passing
# the bare program name "Malaria RDT Performance Sampling" matched
# nothing and scrollUntilVisible timed out scrolling a list where the
# tile was plainly visible; passing the FULL tile label
# "Malaria RDT Performance Sampling — malaria-rdt (run 20260531-0739)"
# matched on the first try. So OPP_NAME MUST be the exact, complete tile
# title — read verbatim from
# `run_state.yaml.phases.connect-setup.products.connect.opportunity.name`
# (see the header note), never a truncation or a slug-reassembly. The
# run-id suffix it carries also makes each run's title unique, so the
# whole-label match lands on exactly this run's card. Phase 4
# `connect-opp-setup` already produces names like
# "Turmeric Market Survey — turmeric (run 20260515-0536)".

# Bring the target tile into the rendered viewport BEFORE the
# Branch A / Branch B `when:` guards evaluate. Maestro evaluates
# `visible:` only against currently-rendered nodes; with the ACE test
# user's accumulated invite list (3+ prior-run tiles ahead of the
# target is the steady state on any dogfood machine), the target
# title is frequently below the fold. Both branches' in-body
# `scrollUntilVisible` steps would never fire because their parent
# `when: visible: { id: btn_*, below: text: ${OPP_NAME} }` guards
# require the title (and a button below it) to already be visible.
# This unconditional title-scroll restores the precondition both
# guards depend on. Live reproducer: malaria-itn-fgd run
# 20260515-1645 Phase 6 attempt 8 — 4 cards rendered, target tile
# below fold, J1 halt. Class also flagged in
# skills/app-screenshot-capture/SKILL.md § Step 4 "OPP_NAME
# uniqueness assumption" as a known follow-up.
#
# `visibilityPercentage: 60` (not Maestro's default 100) to tolerate
# multi-line title-wrap on opp tiles. The card layout wraps long
# `OPP_NAME` strings to 2-3 lines; at 100% the second line stays clipped
# below the fold even after `scrollUntilVisible` reports success.
# 60% is enough for the title-anchored Branch A/B `runFlow.when` guards
# to evaluate true on the wrapped first line. Live reproducer: Phase 6
# agent in bednet-spot-check/20260525-2022 forked a `bednet-claim-
# custom.yaml` workaround that just relaxed this one knob — folded back
# into canonical here. Applied to every `scrollUntilVisible` in this
# file for parity.
- scrollUntilVisible:
    element:
      text: ${OPP_NAME}
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 60
- assertVisible:
    text: ${OPP_NAME}

# Bring the per-branch BUTTON into the rendered viewport before the
# Branch A / Branch B `when:` guards evaluate. Title-only scrolling
# leaves the title at the viewport bottom on a list with several
# prior-run tiles ahead — the button below the title is clipped, both
# branches' `when: visible: { id: btn_*, below: text: ${OPP_NAME} }`
# guards evaluate to false, and the in-body `scrollUntilVisible` steps
# (which would scroll the button into view) never fire. Catch-22.
#
# Each tile carries EITHER `btn_resume` (in-progress) OR
# `btn_view_opportunity` (new-opportunity) — never both. We try each
# in its own `runFlow` so whichever is present scrolls into view;
# the other branch's `runFlow` no-ops because its `when:` guard
# matches nothing on the rendered hierarchy. Either way the per-
# branch button below the title is now in the viewport and the
# downstream Branch A / Branch B guards can resolve correctly.
#
# `optional: true` ON EACH IN-BODY SCROLL — load-bearing. The `when:`
# guard here is intentionally UNSCOPED (`visible: { id: btn_resume }`,
# no `below: text: ${OPP_NAME}`): that is what lets the block fire
# while the target's own button is still clipped below the fold and
# scroll it into view (the below-fold catch-22 this block was added
# to break — a `below: text: ${OPP_NAME}`-scoped guard would require
# the target button to ALREADY be visible, defeating the purpose).
# But an unscoped guard also matches a STALE prior-run tile's button
# higher in the list (e.g. a leftover Resume tile in "In Progress").
# When that happens the guard fires but the title-scoped scroll
# `btn_resume below: text: ${OPP_NAME}` finds nothing in that section
# (this run's opp is a New Opportunity, not in-progress). WITHOUT
# `optional: true` that mismatch is a HARD Maestro failure that
# aborts the claim. WITH it, the scroll no-ops and control falls
# through to the other branch's block — which correctly scrolls the
# target's actual button into view. The guard scope and the body
# scope deliberately differ here; `optional: true` is what makes the
# differing scope safe instead of fatal.
#
# The claim recipe MUST be robust to other opps' tiles being present:
# cross-run invite-list accumulation is the steady state on any
# dogfood machine (`/ace:sweep connect` does NOT clear
# OpportunityAccess; see CLAUDE.md gotchas + project_demo_user_rotation).
#
# Live reproducer (unscoped-guard / scoped-body mismatch class):
# malaria-itn-app run 20260528-1607 Phase 6 — a stale "Bednet
# Spot-Check (E2E Smoke) — run 20260528-0556" tile sat in In Progress
# ABOVE this run's unclaimed target; the unscoped `btn_resume` guard
# matched the stale Resume button, entered the body, and the
# non-optional title-scoped scroll hard-failed before the
# btn_view_opportunity block ever got a turn.
#
# Original below-fold reproducer (what this block was added for):
# malaria-itn-fgd run 20260515-1645 Phase 6 attempt 11 — 5+ invite
# tiles, target title scrolled to viewport bottom by the title-scroll
# above, button clipped below-fold, both `when:` guards skipped,
# recipe halted. Third PR in the claim-opp series (PR #346 = title
# scroll; PR #348 = post-start wait; this = post-title button scroll).
# See `skills/app-screenshot-capture/SKILL.md § Step 4 "OPP_NAME
# uniqueness assumption"` for the durable cross-recipe pattern.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/btn_resume"
    commands:
      - scrollUntilVisible:
          element:
            id: "org.commcare.dalvik:id/btn_resume"
            below:
              text: ${OPP_NAME}
          direction: DOWN
          timeout: 10000
          visibilityPercentage: 60
          optional: true
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/btn_view_opportunity"
    commands:
      - scrollUntilVisible:
          element:
            id: "org.commcare.dalvik:id/btn_view_opportunity"
            below:
              text: ${OPP_NAME}
          direction: DOWN
          timeout: 10000
          visibilityPercentage: 60
          optional: true

# --- BRANCH A: in-progress (btn_resume present) ---
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/btn_resume"
        below:
          text: ${OPP_NAME}
    commands:
      # Scroll on the BUTTON itself (anchored to our title) so the tap
      # target ends up in the viewport, not just the title text.
      - scrollUntilVisible:
          element:
            id: "org.commcare.dalvik:id/btn_resume"
            below:
              text: ${OPP_NAME}
          direction: DOWN
          timeout: 20000
          visibilityPercentage: 60
      - takeScreenshot: "claim-opp-resume-tile"
      - tapOn:
          id: "org.commcare.dalvik:id/btn_resume"
          below:
            text: ${OPP_NAME}
          retryTapIfNoChange: true
      # Resume on an in-progress opp can land on one of THREE surfaces
      # depending on what's persisted on the device:
      #   (i)  Opp-detail "Job Card" with `viewJobCard` + `learning_card`
      #        + `connect_learning_button` ("DOWNLOAD LEARN APP") — fires
      #        when Connect's per-opp progress is server-side but the
      #        Learn CCZ is NOT installed locally (e.g. after a Connect
      #        data wipe, which happens during local-bootstrap heal —
      #        verified live 2026-05-15 turmeric run 20260515-0536
      #        attempt 6 immediately after `pm clear org.commcare.dalvik`).
      #        The `acb_resume` button on this surface re-triggers the
      #        same in-progress flow but is a no-op on a wiped device.
      #        Tapping `connect_learning_button` is what actually starts
      #        the CCZ download (POST /users/start_learn_app/) and
      #        transitions us to the Learn-app StandardHomeActivity
      #        once the 14-step download finishes.
      #   (ii) Opp-detail with `btn_start` (the original New-Opportunity
      #        screen) — fires for some Connect states; same handler as
      #        Branch B.
      #   (iii) Directly on Learn-app StandardHomeActivity — fires when
      #        the CCZ is already cached locally.
      # Probe for each in priority order. The `nsv_home_screen` wait
      # below covers (iii) implicitly.
      - runFlow:
          when:
            visible:
              id: "org.commcare.dalvik:id/connect_learning_button"
          commands:
            - takeScreenshot: "claim-opp-resume-jobcard"
            - tapOn:
                id: "org.commcare.dalvik:id/connect_learning_button"
                retryTapIfNoChange: true
      - runFlow:
          when:
            visible:
              id: "org.commcare.dalvik:id/btn_start"
          commands:
            - takeScreenshot: "claim-opp-resume-detail"
            - tapOn:
                id: "org.commcare.dalvik:id/btn_start"
                retryTapIfNoChange: true

# --- BRANCH B: new-opportunity (btn_view_opportunity present) ---
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/btn_view_opportunity"
        below:
          text: ${OPP_NAME}
    commands:
      # Scroll on the button anchored to the title — see comment above
      # about title-only scrolling leaving the button clipped.
      - scrollUntilVisible:
          element:
            id: "org.commcare.dalvik:id/btn_view_opportunity"
            below:
              text: ${OPP_NAME}
          direction: DOWN
          timeout: 20000
          visibilityPercentage: 60
      - takeScreenshot: "claim-opp-new-tile"
      - tapOn:
          id: "org.commcare.dalvik:id/btn_view_opportunity"
          below:
            text: ${OPP_NAME}
      - extendedWaitUntil:
          visible:
            id: "org.commcare.dalvik:id/btn_start"
          timeout: 10000
      - takeScreenshot: "claim-opp-detail"
      # `retryTapIfNoChange: true` defends against tap-loss on btn_start.
      # Live reproducer: malaria-itn-app run 20260517-1829 re-verify
      # 2026-05-20 (`~/.maestro/tests/2026-05-20_192047/maestro.log`):
      # Maestro logged `Tap COMPLETED` on btn_start at the correct
      # bounds ([42,899][284,1056], enabled=true, clickable=true), then
      # waited 180s for nsv_home_screen. The 180s timeout expired with
      # btn_start still rendered identically (post-failure screenshot
      # pixel-identical to the pre-tap one) — the single tap event was
      # either dropped by Android or Connect's onClick(btn_start) fired
      # and the `POST /users/start_learn_app/` silently failed. With
      # `retryTapIfNoChange: true` Maestro detects the no-hierarchy-change
      # state ~1s after the first tap and re-taps, surviving transient
      # tap loss without masking a genuinely-wedged state (Maestro caps
      # retries). Applied to btn_resume + connect_learning_button +
      # both btn_start sites for parity.
      - tapOn:
          id: "org.commcare.dalvik:id/btn_start"
          retryTapIfNoChange: true
# After Start, Connect fires POST /users/start_learn_app/ and downloads
# the Learn CCZ ("Downloading Learn App" progress, Step N of 14, atlas
# §4). On a verified+invited demo user, the post-download transition
# auto-launches the Learn app's StandardHomeActivity (atlas §5) — the
# 4-tile home grid (Start / View Job Status / Sync with Server /
# Log out of CommCare). The Connect-side modules-list teaser
# (`tv_learn_modules_list`) is BYPASSED entirely on this path; it
# only renders pre-claim (atlas §3). Earlier versions of this recipe
# waited on `tv_learn_modules_list` here — verified against the live
# AVD 2026-05-14, that selector never reappears post-claim.
#
# Anchor on the Learn-app home's ScrollView (`nsv_home_screen`) which
# is the StandardHomeActivity-specific signal; `learn-launch.yaml` will
# then take over by tapping the Start tile.
#
# Timeout: 180s. CommCare's first-boot of the Learn app after btn_start
# combines: (i) POST /users/start_learn_app/ round-trip, (ii) the 14-step
# Learn CCZ download ("Downloading Learn App" progress dialog), and
# (iii) the initial in-app module install + first-sync of empty case
# data before StandardHomeActivity renders `nsv_home_screen`. On a fresh
# cold-booted AVD with no warmed network paths, the full window can run
# 30s on the fast end and well past 60s on the slow end. The earlier
# 60s timeout was tight enough that it expired with Connect's opp-detail
# screen still rendered — assertion failed, recipe halted. Live
# reproducer: malaria-itn-fgd run 20260515-1645 Phase 6 attempt 9
# (.maestro/tests/2026-05-17_191039/) — 60s elapsed between Start tap
# and FAILED, ending screenshot still on opp-detail. Surfaced now
# because PR #346 (unconditional title-scroll) was what finally got the
# recipe far enough to actually tap Start; prior halts terminated
# upstream. 180s gives a comfortable margin without masking a genuinely
# wedged download (which would still throw, just later).
# Let the post-Start transition begin to settle before branching.
- waitForAnimationToEnd:
    timeout: 10000
#
# Already-Learn-complete branch (#570). If the test user has ALREADY
# completed Learn on this opp (one-way state), Connect routes "Continue
# Learning" to the Deliver download gate (connect_delivery_button =
# "DOWNLOAD"), NOT the Learn home — so asserting nsv_home_screen would
# hard-fail after 180s on a perfectly healthy opp. When the Deliver gate
# is what rendered, capture it and SKIP the Learn-home assert; the
# caller's Learn leg (app-screenshot-capture Step 5 / 2.7) inspects the
# landing screen via mobile_capture_ui_dump, records the Learn
# sub-verdict as `satisfied-by-prior-completion`, and proceeds to the
# Deliver leg. Do NOT re-walk Learn and do NOT treat this as a blocker.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_delivery_button"
    commands:
      - takeScreenshot: "claim-already-learn-complete-deliver-gate"
#
# Fresh-Learn branch: Learn not yet complete → wait for the Learn home.
# (Guarded on the Deliver gate NOT being present so we don't burn the
# 180s timeout on an already-complete opp.)
- runFlow:
    when:
      notVisible:
        id: "org.commcare.dalvik:id/connect_delivery_button"
    commands:
      - extendedWaitUntil:
          visible:
            id: "org.commcare.dalvik:id/nsv_home_screen"
          timeout: 180000
- takeScreenshot: "claim-opp-handoff-learn-home"
