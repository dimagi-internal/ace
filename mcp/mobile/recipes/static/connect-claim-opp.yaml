# Fully calibrated against CommCare 2.62.0 on ACE_Pixel_API_34_PS,
# 2026-04-30. Driven end-to-end with +74260000100 invited via
# `connect_send_flw_invite` after `connect_finalize_opportunity`.
#
# Discovery loop notes:
# - Post-registration the user lands on CommCare's "Welcome" screen
#   (resource-id screen_first_start_main) with a nav drawer that includes
#   an "Opportunities" item. Tapping that item triggers a system
#   "Unlock PersonalID" credential prompt (BiometricPrompt with device-
#   credential fallback) — the answer is the registration PIN. The
#   recipe will need to handle this prompt; selector is
#   com.android.systemui:id/lockPassword.
# - The opp-list screen is `connect_fragment_jobs_list` with an
#   `rvJobList` RecyclerView. Empty-state shows `connect_no_jobs_text`.
# - The toolbar exposes `action_sync` (top-right) and `action_bell`.
# Required env vars (pass via `mobile_run_recipe.envVars`):
#   PIN      — 4-digit device PIN for the ACE test user
#              (from `${ACE_E2E_PIN}` in $CLAUDE_PLUGIN_DATA/.env)
#   OPP_NAME — display name of the opportunity to claim. Must match the
#              substring rendered on the opp card in
#              `connect_fragment_jobs_list`. With multiple claimed opps
#              (e.g. a real run alongside stale dogfood opps from prior
#              runs), tapping the first card grabs whichever sorts
#              first — silently the wrong one. Pinning to text avoids
#              that. Tracking: jjackson/ace#115 finding 4.
appId: org.commcare.dalvik
---
# Two valid starting surfaces after connect-login.yaml:
#   (a) screen_first_start_main with nav drawer (cold-launch with prior session)
#   (b) connect_fragment_jobs_list directly (warm post-login state)
#
# Branch (a): if first-start is visible, navigate via nav drawer + handle
# the OS lockPassword unlock.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/screen_first_start_main"
    commands:
      - tapOn:
          text: "Opportunities"
      - runFlow:
          when:
            visible:
              id: "com.android.systemui:id/lockPassword"
          commands:
            - tapOn:
                id: "com.android.systemui:id/lockPassword"
            - inputText: ${PIN}
            - pressKey: Enter

# Either branch lands us on the jobs list. CONFIRMED 2026-04-30 round 4:
# post-connect-login.yaml lands directly on connect_fragment_jobs_list
# without screen_first_start_main, so branch (a) above correctly skips.
- assertVisible:
    id: "org.commcare.dalvik:id/connect_fragment_jobs_list"

# Wait for the jobs list to populate any opp card.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/btn_view_opportunity"
    timeout: 15000
- takeScreenshot: "claim-opp-list"

# Pin to OPP_NAME instead of the first card. With multiple claimed opps
# (real runs alongside stale dogfood opps), tapping the first
# `btn_view_opportunity` grabs whichever the RecyclerView sorts first —
# silently wrong. Match on the card text directly.
#
# The opp card's display text is the program/opp's display name (NOT the
# bare slug — round 5 of the 2026-04-30 calibration round confirmed
# this). Pass the display name as `OPP_NAME` to mobile_run_recipe.
# `visibilityPercentage: 30` so the matcher hits even if the card text
# wraps across multiple lines.
- assertVisible:
    text: ${OPP_NAME}
- tapOn:
    text: ${OPP_NAME}
    visibilityPercentage: 30
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/btn_start"
    timeout: 10000
- takeScreenshot: "claim-opp-detail"
- tapOn:
    id: "org.commcare.dalvik:id/btn_start"
# After Start, the detail screen transitions in-place: the "Start"
# button disappears and the Learn modules section becomes the
# interactive entry point. tv_learn_modules_list is the stable
# post-acceptance signal.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/tv_learn_modules_list"
    timeout: 30000
- takeScreenshot: "claim-opp-handoff"
