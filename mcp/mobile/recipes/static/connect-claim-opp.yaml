# Fully calibrated against CommCare 2.62.0 on ACE_Pixel_API_34_PS,
# 2026-04-30. Driven end-to-end with +74260000100 invited via
# `connect_send_flw_invite` after `connect_finalize_opportunity`.
#
# Discovery loop notes:
# - Post-registration the user lands on CommCare's "Welcome" screen
#   (resource-id screen_first_start_main) with a nav drawer that includes
#   an "Opportunities" item. Tapping that item triggers a system
#   "Unlock PersonalID" credential prompt (BiometricPrompt with device-
#   credential fallback) — the answer is the registration PIN. The
#   recipe will need to handle this prompt; selector is
#   com.android.systemui:id/lockPassword.
# - The opp-list screen is `connect_fragment_jobs_list` with an
#   `rvJobList` RecyclerView. Empty-state shows `connect_no_jobs_text`.
# - The toolbar exposes `action_sync` (top-right) and `action_bell`.
# Required env vars (pass via `mobile_run_recipe.envVars`):
#   PIN      — 4-digit device PIN for the ACE test user
#              (from `${ACE_E2E_PIN}` in $CLAUDE_PLUGIN_DATA/.env)
#   OPP_NAME — display name of the opportunity to claim. Must match the
#              substring rendered on the opp card in
#              `connect_fragment_jobs_list`. With multiple claimed opps
#              (e.g. a real run alongside stale dogfood opps from prior
#              runs), tapping the first card grabs whichever sorts
#              first — silently the wrong one. Pinning to text avoids
#              that. Tracking: jjackson/ace#115 finding 4.
appId: org.commcare.dalvik
---
# Two valid starting surfaces after connect-login.yaml:
#   (a) screen_first_start_main with nav drawer (cold-launch with prior session)
#   (b) connect_fragment_jobs_list directly (warm post-login state)
#
# Branch (a): if first-start is visible, navigate via nav drawer + handle
# the OS lockPassword unlock.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/screen_first_start_main"
    commands:
      - tapOn:
          text: "Opportunities"
      - runFlow:
          when:
            visible:
              id: "com.android.systemui:id/lockPassword"
          commands:
            - tapOn:
                id: "com.android.systemui:id/lockPassword"
            - inputText: ${PIN}
            - pressKey: Enter

# Either branch lands us on the jobs list. CONFIRMED 2026-04-30 round 4:
# post-connect-login.yaml lands directly on connect_fragment_jobs_list
# without screen_first_start_main, so branch (a) above correctly skips.
- assertVisible:
    id: "org.commcare.dalvik:id/connect_fragment_jobs_list"

# Wait for the jobs list to populate any opp card.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/btn_view_opportunity"
    timeout: 15000
- takeScreenshot: "claim-opp-list"

# Pin to OPP_NAME instead of the first card. With multiple claimed opps
# (real runs alongside stale dogfood opps), tapping the first
# `btn_view_opportunity` grabs whichever the RecyclerView sorts first —
# silently wrong. Match on the card text directly.
#
# The opp card's display text is the program/opp's display name (NOT the
# bare slug — round 5 of the 2026-04-30 calibration round confirmed
# this). Pass the display name as `OPP_NAME` to mobile_run_recipe.
#
# `visibilityPercentage` removed 2026-05-13: the cloud Maestro build
# (dadb 1.2.10 / Maestro 1.36-ish based on its CLI banner) doesn't
# recognize the property and rejects the whole recipe with an
# `Unknown Property` parse error before the first step executes.
# Caught in vivo on leep Phase 6 attempt 10 against the cloud
# emulator. The matcher works without it for cards with wrapped
# text — Maestro defaults to substring + a low visibility threshold,
# which is enough for our card layouts.
#
# Scroll the target tile into view. Newest invite appears at the BOTTOM
# of `rvJobList` for the ACE test user (the test user accumulates invites
# across runs, and the newest is appended to the end — not prepended).
# Verified live 2026-05-14 on turmeric run 20260513-2243 retry. The
# atlas's "Scroll behavior" entry in § 2 documents the same fact.
# scrollUntilVisible bounded at 20s — enough to walk past several
# screens of accumulated invites without infinite-looping if the
# OPP_NAME truly isn't present.
#
# IMPORTANT: anchor the scroll on `btn_view_opportunity` *below* the
# target title, NOT on the title text alone. Anchoring on the title is
# insufficient — once the title is visible at the bottom of the
# viewport, the button beneath it on the same card can still be
# clipped off-screen (verified 2026-05-15 on turmeric run
# 20260515-0536: title bounds y=2126..2233, button bounds y~2353..2432,
# viewport bottom y=2337 — title visible but button clipped, so the
# subsequent `tapOn(id:btn_view_opportunity, below:text:${OPP_NAME})`
# fails because the matched node isn't actually rendered). Driving
# the scroll by the element we need to tap guarantees it ends up in
# the viewport. The `below: text: ${OPP_NAME}` scoping inside the
# element selector keeps us pinned to the correct card (the topmost
# `btn_view_opportunity` would otherwise belong to a stale prior-run
# invite higher in the list).
- scrollUntilVisible:
    element:
      id: "org.commcare.dalvik:id/btn_view_opportunity"
      below:
        text: ${OPP_NAME}
    direction: DOWN
    timeout: 20000
- assertVisible:
    id: "org.commcare.dalvik:id/btn_view_opportunity"
# Tap the View Opportunity button SCOPED to the card containing the
# target title. `tvTitle` is not clickable (`clickable=false` per UI
# dump 2026-05-14); `rootCardView` is not clickable either. Only
# `btn_view_opportunity` is. Without the `below: text` scoping we'd
# tap the topmost matching button — some unrelated prior-run invite.
# `below: text: ${OPP_NAME}` finds the first `btn_view_opportunity`
# whose y-coordinate is below the OPP_NAME text — i.e. the button on
# the same card as the title we want.
- tapOn:
    id: "org.commcare.dalvik:id/btn_view_opportunity"
    below:
      text: ${OPP_NAME}
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/btn_start"
    timeout: 10000
- takeScreenshot: "claim-opp-detail"
- tapOn:
    id: "org.commcare.dalvik:id/btn_start"
# After Start, Connect fires POST /users/start_learn_app/ and downloads
# the Learn CCZ ("Downloading Learn App" progress, Step N of 14, atlas
# §4). On a verified+invited demo user, the post-download transition
# auto-launches the Learn app's StandardHomeActivity (atlas §5) — the
# 4-tile home grid (Start / View Job Status / Sync with Server /
# Log out of CommCare). The Connect-side modules-list teaser
# (`tv_learn_modules_list`) is BYPASSED entirely on this path; it
# only renders pre-claim (atlas §3). Earlier versions of this recipe
# waited on `tv_learn_modules_list` here — verified against the live
# AVD 2026-05-14, that selector never reappears post-claim.
#
# Anchor on the Learn-app home's ScrollView (`nsv_home_screen`) which
# is the StandardHomeActivity-specific signal; `learn-launch.yaml` will
# then take over by tapping the Start tile. 60s timeout accommodates the
# 14-step CCZ download on slow connections.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/nsv_home_screen"
    timeout: 60000
- takeScreenshot: "claim-opp-handoff-learn-home"
