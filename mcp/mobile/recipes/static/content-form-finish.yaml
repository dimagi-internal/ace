# Score-gated finalize (the two-screen FINISH path, #569). If the form
# is a score-gated content form whose last screen is a result-label
# screen (FINISH, not auto-finalize), the advance loop above advanced to
# the result screen but did not submit — `nav_btn_finish` is now visible
# and the home Start tile is NOT. Press FINISH to submit + sync, then
# wait for the "form sent to server" toast. No-op for plain content
# forms that already auto-finalized to home (the guard's `notVisible
# learn-home-start-tile` is false once home is reached).
- runFlow:
    when:
      visible:
        ${SELECTOR:form-nav-finish}
      notVisible:
        ${SELECTOR:learn-home-start-tile}
    commands:
      - tapOn:
          ${SELECTOR:form-nav-finish}
      - extendedWaitUntil:
          visible:
            text: ".*form.*sent to server.*"
          timeout: 15000

- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: "${SCREENSHOT_NAME}"

# Verify the precondition for the NEXT module's suite re-entry: we are
# back on StandardHomeActivity home. Fail LOUD with a named anchor if
# the content form did not finalize within the bounded advance loop
# (e.g. a required-input screen we mistook for a content form, or a
# content form with more screens than the bound) — a precise miss beats
# a silent maestro-process timeout (jjackson/ace#646).
- assertVisible:
    ${SELECTOR:learn-home-start-tile}
