# Drive CommCare PersonalID from the post-Continue state through to
# account creation, end-to-end automated.
#
# This recipe assumes the +7426 demo-bypass prefix is in use (Connect-id
# special-cases that range to skip OTP entirely). The non-demo OTP path is
# not maintained — see CHANGELOG 0.10.x. ACE has no use case for testing
# real-OTP delivery on a managed test phone.
#
# Selectors verified live on CommCare 2.62.0 on 2026-04-29.
# Registration steps 1–28 verified against ACE_Pixel_API_34_PS (Play
# Store image) registering ${ACE_E2E_PHONE} (originally +74260000100;
# rotated to a fresh demo user 2026-05-27 to escape OpportunityAccess
# accumulation — see CLAUDE.md § Demo-user rotation) from a fresh
# install. The final
# photo-capture step (29–30) requires a non-GMS AVD — see the photo
# section below and the Face-capture gotcha in
# playbook/integrations/mobile-integration.md.
#
# Variables:
#   ${NAME}         — display name (e.g., "ACE Test User")
#   ${BACKUP_CODE}  — 6-digit numeric (e.g., "123456")
#   ${PIN}          — 4-digit PIN for the device App Lock (defaults to "1234")
#
# AVD prerequisites:
#   - hw.camera.front=emulated (auto-patched by mobile_ensure_avd_running
#     in 0.10.18+; pre-0.10.18 AVDs need a manual edit).
#   - GMS disabled at runtime via
#       adb shell pm disable-user --user 0 com.google.android.gms
#     Both google_apis and google_apis_playstore system images on macOS
#     ship with functional GMS, so the choice of system image doesn't
#     matter — the runtime disable is what flips MicroImageActivity into
#     ManualMode (manual camera_shutter_button visible). Without this
#     step the recipe stalls waiting for ML Kit to detect a face that
#     the emulated front camera can never supply. See § Face-capture
#     gate in playbook/integrations/mobile-integration.md.
#   - CAMERA permission pre-granted to org.commcare.dalvik via
#       adb shell pm grant org.commcare.dalvik android.permission.CAMERA
#     so MicroImageActivity doesn't bail on first launch.
#   commands/mobile-bootstrap.md step 9 runs both adb commands.

appId: org.commcare.dalvik
---

# Demo-user snackbar ("I see you're a demo user, so we'll skip the OTP").
# Auto-fades after ~5s, so this is best-effort: dismiss if still up,
# otherwise the App Lock screen wait below will catch us up.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/snackbar_action"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/snackbar_action"

# App Lock screen offers Configure Fingerprint and Configure PIN; AVD has
# no fingerprint enrolled so we use PIN.
#
# Conditional rather than hard-asserted (changed 2026-05-25 after the
# bednet-spot-check/20260525-1405 phantom blocker): on demo-bypass
# re-registrations where the system lock + Connect account already exist,
# the App Lock screen flashes through too fast for a 15s extendedWaitUntil
# to land and the recipe halts despite the underlying registration
# completing fine on the device. The terminal-state assertion at the end
# of this recipe + `MobileClient.registerTestUser`'s post-failure
# device-state probe both close the same gap from different angles.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_verify_pin_button"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/connect_verify_pin_button"

# Two branches here:
#
#   A) Device has no screen lock yet → CommCare hands off to
#      com.android.settings/.password.ChooseLockPassword. We pick PIN, set
#      it, confirm it, dismiss the lock-screen redaction interstitial, then
#      come back to the App Lock screen and tap AGREE & CONTINUE.
#   B) Device already has a screen lock (e.g., a prior registration set the
#      PIN globally) → Configure-PIN immediately surfaces the system unlock
#      prompt without going through the chooser. Skip A, go straight to the
#      unlock step further down.
- runFlow:
    when:
      visible:
        id: "com.android.settings:id/lock_pin"
    commands:
      - tapOn:
          id: "com.android.settings:id/lock_pin"
      - extendedWaitUntil:
          visible:
            id: "com.android.settings:id/password_entry"
          timeout: 5000
      - inputText: ${PIN}
      - tapOn: "NEXT"
      - waitForAnimationToEnd:
          timeout: 2000
      - inputText: ${PIN}
      - tapOn: "CONFIRM"
      - extendedWaitUntil:
          visible:
            text: "Lock screen"
          timeout: 5000
      - tapOn: "DONE"
      - extendedWaitUntil:
          visible:
            text: "AGREE & CONTINUE"
          timeout: 10000
      - tapOn: "AGREE & CONTINUE"

# System biometric prompt: "Unlock PersonalID" / "Please unlock to continue".
# Enter the PIN we just set. Conditional — on re-registrations where the
# system lock is already set up, this prompt may not appear at all (Connect
# auto-advances past it).
- runFlow:
    when:
      visible:
        id: "com.android.systemui:id/lockPassword"
    commands:
      - tapOn:
          id: "com.android.systemui:id/lockPassword"
      - inputText: ${PIN}
      - pressKey: Enter

# Second snackbar after successful unlock (same demo-user message). Some
# CommCare builds re-show it post-unlock; runFlow.when keeps the recipe
# working whether it appears or not.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/snackbar_action"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/snackbar_action"

# Three flow paths to handle (CommCare 2.62.0):
#
#   Fresh user, never seen server-side:
#     Name → Backup Code → Photo capture → home
#
#   Server account, no local data (post `-wipe-data` cold boot):
#     Name (transient) → Backup Code → "Welcome Back" + re-enter Backup
#     Code → "Account Recovered" → home
#
#   Server account + local data (e.g., snapshot reload, demo-bypass phone):
#     Skip Name → "Welcome Back" + Backup Code → "Account Recovered" → home
#
# CommCare 2.62.0 removed the `connect_backup_code_repeat_input` field that
# older recipes relied on. Both flows now share a single
# `connect_backup_code_input` + `connect_backup_code_button` widget pair;
# the differentiator is whether the "Welcome back ACE Test" header
# (`welcome_back`) appears as a re-confirmation step. We sequence
# `runFlow.when` checks so each path matches at most one branch and the
# others skip cleanly. Live-verified 2026-05-01.
#
# CommCare 2.63.0 replaced the single backup-code text field with a
# six-cell PIN-style widget (`backup_code_view` LinearLayout containing
# six unidentified single-char EditText children). Maestro's `inputText`
# auto-advances across the cells, so the recipe just needs a different
# gating selector + no `eraseText`/`hideKeyboard`. The 2.62.0 branches
# below skip cleanly on 2.63.0 since the old field id is never visible.
#
# DUAL-FIELD CREATE-CODE SCREEN (2.63.0 fresh signup) — added 2026-05-27.
# The 2.63.0 *fresh-signup* path ("Create a new Backup Code",
# id `recovery_code_tilte`) has TWO six-cell widgets stacked: Code
# (`backup_code_view`) and Confirm Code (`confirm_code_view`), with a
# single CONTINUE button (`connect_backup_code_button`) that stays
# `enabled=false` until BOTH widgets hold matching 6-digit values. The
# earlier "Live-verified 2026-05-22" note was on the *recovery* path
# (already-registered user re-entering an existing code), which shows
# only `backup_code_view` and no confirm field — so the confirm field
# went unnoticed until the first fresh +7426 demo-user registration
# under 2.63.0 (2026-05-27, demo-user rotation to +74260000101). We fill
# `backup_code_view`, then conditionally fill `confirm_code_view` when
# present (the recovery path skips it), then tap CONTINUE. Field ids
# captured live from ACE_Pixel_API_34 / CommCare 2.63.0 on 2026-05-27;
# see docs/learnings/2026-05-27-demo-user-rotation.md.

# Optional Name screen (skipped on snapshot-reload + already-registered).
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/nameTextValue"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/nameTextValue"
      - inputText: ${NAME}
      - hideKeyboard
      - tapOn:
          id: "org.commcare.dalvik:id/personalid_name_continue_button"

# Settle whichever Backup Code surface is rendering before probing
# visibility — the screen swaps in via fragment transition.
- waitForAnimationToEnd:
    timeout: 5000

# 2.63.0+ path: six-cell PIN widget. `inputText` auto-advances across the
# cells; no eraseText needed since cells masked individually.
# Fresh signup additionally has a Confirm Code widget (`confirm_code_view`)
# that must match before CONTINUE enables; the recovery/welcome-back path
# has only `backup_code_view`. Fill Code always, Confirm conditionally.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/backup_code_view"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/backup_code_view"
      - inputText: ${BACKUP_CODE}
      - waitForAnimationToEnd:
          timeout: 2000
      # Confirm Code — present only on the fresh-signup create-code screen.
      # CONTINUE (connect_backup_code_button) is enabled=false until this
      # matches Code, so a fresh +7426 registration halts here without it.
      - runFlow:
          when:
            visible:
              id: "org.commcare.dalvik:id/confirm_code_view"
          commands:
            - tapOn:
                id: "org.commcare.dalvik:id/confirm_code_view"
            - inputText: ${BACKUP_CODE}
            - waitForAnimationToEnd:
                timeout: 2000
      - tapOn:
          id: "org.commcare.dalvik:id/connect_backup_code_button"

# 2.62.0 path: single-field initial entry. erase a generous 12 chars so a
# pre-filled value doesn't get concatenated.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_backup_code_input"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/connect_backup_code_input"
      - eraseText: 12
      - inputText: ${BACKUP_CODE}
      - hideKeyboard
      - tapOn:
          id: "org.commcare.dalvik:id/connect_backup_code_button"

# 2.62.0 only: some recovery flows re-prompt with "Welcome back" + the
# same single backup-code field as a confirmation step. (2.63.0 handles
# initial + confirm in the combined 6-cell branch above.)
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_backup_code_input"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/connect_backup_code_input"
      - eraseText: 12
      - inputText: ${BACKUP_CODE}
      - hideKeyboard
      - tapOn:
          id: "org.commcare.dalvik:id/connect_backup_code_button"

# "Account Recovered" success dialog (every recovery path lands here).
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_message_button"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/connect_message_button"

# Photo capture (only truly-fresh registration reaches this — server has
# no prior account, so neither welcome_back nor connect_message_button
# fired above). Two modes depending on Google Play Services:
#
#   * GMS-enabled: MicroImageActivity uses ML Kit face detection to
#     auto-trigger the shutter when a face stabilizes in the viewfinder.
#     The AVD's emulated front camera shows a gray test pattern, never a
#     real face, so this mode hangs forever.
#   * GMS-disabled: falls back to FaceCaptureView.CaptureMode.ManualMode
#     and exposes a manual `camera_shutter_button`. Maestro can tap it.
#
# 0.10.68 moved GMS toggling to `MobileClient.registerTestUser` —
# enabled before part A so CommCare's launch check passes, disabled
# between parts so face-capture in part B picks ManualMode. See the
# Face-capture gotcha in playbook/integrations/mobile-integration.md.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/take_photo_button"
    commands:
      - tapOn:
          id: "org.commcare.dalvik:id/take_photo_button"
      - extendedWaitUntil:
          visible:
            id: "org.commcare.dalvik:id/camera_shutter_button"
          timeout: 8000
      - tapOn:
          id: "org.commcare.dalvik:id/camera_shutter_button"
      - extendedWaitUntil:
          visible:
            id: "org.commcare.dalvik:id/save_photo_button"
          timeout: 15000
      - tapOn:
          id: "org.commcare.dalvik:id/save_photo_button"

# Terminal-state assertion (added 2026-05-25 after the
# bednet-spot-check/20260525-1405 phantom blocker). All upstream steps in
# this recipe are conditional because demo-bypass re-registrations can
# blur through intermediate screens (App Lock setup, system unlock
# prompt, photo capture) before Maestro's polling window lands on any of
# them. The recipe is "done" when the device shows one of the Connect-
# home drawer markers — Work History / Opportunities / Messaging /
# CommCare Apps — which only appear post-registration. 60s budget covers
# the slow path (Account Recovered dialog + Learn auto-claim+install on
# pre-invited demo users).
#
# Mirrors the post-registered signal classifyDeviceUserState() reads in
# mcp/mobile/client.ts:169. Keep the alternatives in sync if either
# side changes.
#
# The post-registration anchor switched from text to resource-id between
# Connect 2.62.0 and 2.63.0 — the 2.62.0-era drawer item "Work History"
# (and siblings "Opportunities", "Messaging", "CommCare Apps") was the
# original textRegex set, but 2.63.0's post-registration landing screen
# is the jobs list with toolbar "Connect" and a `connect_fragment_jobs_list`
# fragment containing `rvJobList`. None of the old text anchors render
# on the new screen, so any text-based wait silently times out even
# though registration succeeded. Anchor on the resource-id instead —
# `rvJobList` is the post-registration RecyclerView, present only after
# the user is fully signed in, and survives label drift across Connect
# UI refreshes. Live-verified against ACE_Pixel_API_34 running CommCare
# 2.63.0 on 2026-05-26 (malaria-rdt run 20260525-2029 Phase 6 debug arc).
#
# Mirrors the post-registered signal classifyDeviceUserState() reads in
# mcp/mobile/client.ts:169. Keep the alternatives in sync if either
# side changes.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/rvJobList"
    timeout: 60000
