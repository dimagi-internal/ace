# Sign in an already-registered PersonalID user (CommCare 2.62.0+ integrated
# Connect flow). Resilient to four starting states:
#
#   1. First-start (fresh CommCare install, no CCZ chosen) — splash shows
#      `str_setup_message` AND the `connect_login_button` ("GO TO CONNECT
#      MENU"). Tap it directly; no nav drawer needed.
#   2. Post-install signed-out — nav drawer with "Sign In / Register"
#      button. Open drawer, tap sign-in.
#   3. Signed-out-but-registered re-login (`screen_login_main`) — a warm
#      launch after the PersonalID session has dropped/locked: welcome_msg
#      "Welcome <user>!", `connect_login_button` ("GO TO CONNECT MENU")
#      and `login_button` ("LOGIN WITH PERSONALID"), but NO
#      `str_setup_message`. Tap `connect_login_button` → OS PIN unlock →
#      jobs list. Live-captured + verified 2026-06-01 (jjackson/ace#592
#      item 3). The earlier hard wait on `str_setup_message` aborted here.
#   4. Already signed in — the Connect home is visible after either path
#      (anchored on `connect_fragment_jobs_list` id, which is present
#      whether or not the user has fresh invites — "New Opportunities" is
#      a section header that only renders pre-claim, so id is the
#      stable anchor across the claim transition). Short-circuit with a
#      screenshot.
#
# After landing on the phone-entry screen, this recipe:
#   - Dismisses the Google Play Services phone-hint sheet that pops on
#     AutoCompleteTextView focus
#   - Enters phone + consent + Continue
#   - Handles the +7426 demo-user snackbar bypass (taps OK)
#   - Enters the device PIN at the OS-level BiometricPrompt that gates
#     PersonalID unlock
#   - Lands at the post-login Connect home
#
# Required env vars (pass via `mobile_run_recipe.envVars`):
#   COUNTRY_CODE — e.g., "1", "91", "7426" (no leading +)
#   PHONE_LOCAL  — local-part of the phone (no country code)
#   PIN          — 4-digit device PIN for the ACE test user (from
#                  `${ACE_E2E_PIN}` in $CLAUDE_PLUGIN_DATA/.env)
appId: org.commcare.dalvik
---
- launchApp:
    appId: org.commcare.dalvik
    clearState: false

# Block until an actionable entry surface renders, WITHOUT hard-asserting
# any single one. A warm launch lands on ONE of:
#   - first-start splash         → str_setup_message + connect_login_button
#   - signed-out-but-registered  → screen_login_main + welcome_msg
#                                  ("Welcome <user>!") + connect_login_button
#                                  ("GO TO CONNECT MENU") + login_button
#                                  ("LOGIN WITH PERSONALID")
#   - already signed in          → connect_fragment_jobs_list straight away
#
# The signed-out-but-registered surface (screen_login_main) is
# jjackson/ace#592 item 3 — live-captured 2026-06-01. The prior hard
# `extendedWaitUntil str_setup_message` aborted the whole recipe here
# because that surface has NO str_setup_message. Fix: if not already on
# the jobs list, wait for `connect_login_button` — which is present on
# BOTH surfaces where we must tap it (first-start AND re-login) — with
# `optional: true` so a slow/edge surface falls through to the
# conditional branches instead of hard-failing. The post-install
# signed-out (nav-drawer) surface has neither; it burns the optional
# timeout then branch (b) handles it on str_setup_message.
- runFlow:
    when:
      notVisible:
        id: "${SELECTOR:home-jobs-list}"
    commands:
      - extendedWaitUntil:
          visible:
            id: "${SELECTOR:personalid-login-button}"
          timeout: 30000
          optional: true

# Branch (a) first-start OR signed-out-but-registered re-login (#592 item
# 3): both surfaces expose `connect_login_button` ("GO TO CONNECT MENU").
# Tap it directly — no nav drawer on either. On re-login this routes
# straight to the OS PIN unlock (lockPassword) handled below; verified
# live 2026-06-01 (connect_login_button → lockPassword → jobs list).
- runFlow:
    when:
      visible:
        id: "${SELECTOR:personalid-login-button}"
    commands:
      - takeScreenshot: "connect-login-first-start"
      - tapOn:
          id: "${SELECTOR:personalid-login-button}"

# Branch (b) post-install: open nav drawer + tap sign-in. Gated on the
# splash being STILL VISIBLE — which is true on a post-install signed-out
# state where connect_login_button is NOT present. After branch (a) taps
# connect_login_button, the app navigates to the BiometricPrompt and the
# splash is no longer visible, so this branch correctly skips.
#
# Why not `notVisible: connect_login_button`: on the BiometricPrompt
# (post-branch-a) the connect_login_button is also not visible, which
# made the prior gate fire incorrectly and tap a non-existent burger
# icon. Surfaced live in turmeric-20260429-2330 Step 2 retry (2026-04-30).
- runFlow:
    when:
      visible:
        id: "${SELECTOR:app-splash-message}"
    commands:
      - tapOn:
          point: "73,209"
      - extendedWaitUntil:
          visible:
            id: "${SELECTOR:nav-drawer-sign-in}"
          timeout: 5000
      - tapOn:
          id: "${SELECTOR:nav-drawer-sign-in}"

# Already signed in? The Connect home is anchored on the
# `connect_fragment_jobs_list` id — present whether or not the user has
# fresh invites. The "New Opportunities" text used to anchor here, but
# that section only renders pre-claim; on a re-run where the user has
# already claimed the opp, the text disappears but the list container
# stays. Surfaced live in malaria-itn-app run 20260521-1114 Phase 6 J1
# (2026-05-21).
- runFlow:
    when:
      visible:
        id: "${SELECTOR:home-jobs-list}"
    commands:
      - takeScreenshot: "connect-login-already-signed-in"
      - stopApp

# Phone-entry path — gated on the phone field being visible.
#
# An already-registered demo user who taps "GO TO CONNECT MENU" can skip
# the phone-entry flow entirely and land straight on the OS BiometricPrompt
# (PersonalID unlock). In that case `connect_primary_phone_input` never
# appears and we want to fall through to the BiometricPrompt branch
# below. Surfaced live in turmeric-20260429-2330 Step 2 retry round 3
# (2026-04-30, 0.10.51 fix).
- runFlow:
    when:
      visible:
        id: "${SELECTOR:personalid-phone-input}"
    commands:
      # Country code: tap, dismiss GMS phone-hint sheet if it pops, tap again, type.
      - tapOn:
          id: "${SELECTOR:personalid-country-code}"
      - runFlow:
          when:
            visible:
              id: "com.google.android.gms:id/cancel"
          commands:
            - tapOn:
                id: "com.google.android.gms:id/cancel"
      - tapOn:
          id: "${SELECTOR:personalid-country-code}"
      - eraseText: 10
      - inputText: ${COUNTRY_CODE}

      # Phone: same dance — sheet WILL appear on first focus.
      - tapOn:
          id: "${SELECTOR:personalid-phone-input}"
      - runFlow:
          when:
            visible:
              id: "com.google.android.gms:id/cancel"
          commands:
            - tapOn:
                id: "com.google.android.gms:id/cancel"
      - tapOn:
          id: "${SELECTOR:personalid-phone-input}"
      - eraseText: 15
      - inputText: ${PHONE_LOCAL}

      # Consent + Continue
      - tapOn:
          id: "${SELECTOR:personalid-consent-check}"
      - tapOn:
          id: "${SELECTOR:personalid-phone-continue}"

      # Post-Continue:
      # - Demo-user (+7426): snackbar "I see you're a demo user, so we'll
      #   skip the OTP" with id `snackbar_action` / OK. Tap it.
      # - Real users: OTP screen would appear here. Out of scope for ACE;
      #   we deploy demo phones exclusively.
      - runFlow:
          when:
            visible:
              id: "${SELECTOR:demo-snackbar-action}"
          commands:
            - tapOn:
                id: "${SELECTOR:demo-snackbar-action}"

# OS-level BiometricPrompt requesting the device PIN to unlock PersonalID.
# This is the OS unlock surface (`com.android.systemui:id/lockPassword`),
# not a CommCare screen.
- runFlow:
    when:
      visible:
        id: "com.android.systemui:id/lockPassword"
    commands:
      - tapOn:
          id: "com.android.systemui:id/lockPassword"
      - inputText: ${PIN}
      - pressKey: Enter

# Land at the Connect home — anchored on `connect_fragment_jobs_list`
# id, which is present whether the user has fresh invites (New
# Opportunities section header rendered) OR only claimed opps (no header,
# just In Progress tiles). Text anchor "New Opportunities" was previously
# used but it disappears once every invite has been claimed.
- extendedWaitUntil:
    visible:
      id: "${SELECTOR:home-jobs-list}"
    timeout: 30000
- takeScreenshot: "connect-login-home"
