# Sign in an already-registered PersonalID user (CommCare 2.62.0+ integrated
# Connect flow). Resilient to three starting states:
#
#   1. First-start (fresh CommCare install, no CCZ chosen) — splash shows
#      `str_setup_message` AND the `connect_login_button` ("GO TO CONNECT
#      MENU"). Tap it directly; no nav drawer needed.
#   2. Post-install signed-out — nav drawer with "Sign In / Register"
#      button. Open drawer, tap sign-in.
#   3. Already signed in — "New Opportunities" home is visible after either
#      path; short-circuit with a screenshot.
#
# After landing on the phone-entry screen, this recipe:
#   - Dismisses the Google Play Services phone-hint sheet that pops on
#     AutoCompleteTextView focus
#   - Enters phone + consent + Continue
#   - Handles the +7426 demo-user snackbar bypass (taps OK)
#   - Enters the device PIN at the OS-level BiometricPrompt that gates
#     PersonalID unlock
#   - Lands at the post-login Connect home
#
# Required env vars (pass via `mobile_run_recipe.envVars`):
#   COUNTRY_CODE — e.g., "1", "91", "7426" (no leading +)
#   PHONE_LOCAL  — local-part of the phone (no country code)
#   PIN          — 4-digit device PIN for the ACE test user (from
#                  `${ACE_E2E_PIN}` in $CLAUDE_PLUGIN_DATA/.env)
appId: org.commcare.dalvik
---
- launchApp:
    appId: org.commcare.dalvik
    clearState: false

- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/str_setup_message"
    timeout: 30000

# Branch (a) first-start: tap "GO TO CONNECT MENU" directly. No nav drawer
# present — that path doesn't exist on first-start.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_login_button"
    commands:
      - takeScreenshot: "connect-login-first-start"
      - tapOn:
          id: "org.commcare.dalvik:id/connect_login_button"

# Branch (b) post-install: open nav drawer + tap sign-in. Gated on the
# splash being STILL VISIBLE — which is true on a post-install signed-out
# state where connect_login_button is NOT present. After branch (a) taps
# connect_login_button, the app navigates to the BiometricPrompt and the
# splash is no longer visible, so this branch correctly skips.
#
# Why not `notVisible: connect_login_button`: on the BiometricPrompt
# (post-branch-a) the connect_login_button is also not visible, which
# made the prior gate fire incorrectly and tap a non-existent burger
# icon. Surfaced live in turmeric-20260429-2330 Step 2 retry (2026-04-30).
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/str_setup_message"
    commands:
      - tapOn:
          point: "73,209"
      - extendedWaitUntil:
          visible:
            id: "org.commcare.dalvik:id/nav_drawer_sign_in_button"
          timeout: 5000
      - tapOn:
          id: "org.commcare.dalvik:id/nav_drawer_sign_in_button"

# Already signed in? "New Opportunities" home is the stable post-login
# anchor. If we landed here directly (either path bypasses to it), screenshot
# and stop cleanly.
- runFlow:
    when:
      visible:
        text: "New Opportunities"
    commands:
      - takeScreenshot: "connect-login-already-signed-in"
      - stopApp

# Phone-entry path — gated on the phone field being visible.
#
# An already-registered demo user who taps "GO TO CONNECT MENU" can skip
# the phone-entry flow entirely and land straight on the OS BiometricPrompt
# (PersonalID unlock). In that case `connect_primary_phone_input` never
# appears and we want to fall through to the BiometricPrompt branch
# below. Surfaced live in turmeric-20260429-2330 Step 2 retry round 3
# (2026-04-30, 0.10.51 fix).
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/connect_primary_phone_input"
    commands:
      # Country code: tap, dismiss GMS phone-hint sheet if it pops, tap again, type.
      - tapOn:
          id: "org.commcare.dalvik:id/countryCode"
      - runFlow:
          when:
            visible:
              id: "com.google.android.gms:id/cancel"
          commands:
            - tapOn:
                id: "com.google.android.gms:id/cancel"
      - tapOn:
          id: "org.commcare.dalvik:id/countryCode"
      - eraseText: 10
      - inputText: ${COUNTRY_CODE}

      # Phone: same dance — sheet WILL appear on first focus.
      - tapOn:
          id: "org.commcare.dalvik:id/connect_primary_phone_input"
      - runFlow:
          when:
            visible:
              id: "com.google.android.gms:id/cancel"
          commands:
            - tapOn:
                id: "com.google.android.gms:id/cancel"
      - tapOn:
          id: "org.commcare.dalvik:id/connect_primary_phone_input"
      - eraseText: 15
      - inputText: ${PHONE_LOCAL}

      # Consent + Continue
      - tapOn:
          id: "org.commcare.dalvik:id/connect_consent_check"
      - tapOn:
          id: "org.commcare.dalvik:id/personalid_phone_continue_button"

      # Post-Continue:
      # - Demo-user (+7426): snackbar "I see you're a demo user, so we'll
      #   skip the OTP" with id `snackbar_action` / OK. Tap it.
      # - Real users: OTP screen would appear here. Out of scope for ACE;
      #   we deploy demo phones exclusively.
      - runFlow:
          when:
            visible:
              id: "org.commcare.dalvik:id/snackbar_action"
          commands:
            - tapOn:
                id: "org.commcare.dalvik:id/snackbar_action"

# OS-level BiometricPrompt requesting the device PIN to unlock PersonalID.
# This is the OS unlock surface (`com.android.systemui:id/lockPassword`),
# not a CommCare screen.
- runFlow:
    when:
      visible:
        id: "com.android.systemui:id/lockPassword"
    commands:
      - tapOn:
          id: "com.android.systemui:id/lockPassword"
      - inputText: ${PIN}
      - pressKey: Enter

# Land at the Connect home (text-anchor; stable across APK rebuilds).
- extendedWaitUntil:
    visible:
      text: "New Opportunities"
    timeout: 30000
- takeScreenshot: "connect-login-home"
