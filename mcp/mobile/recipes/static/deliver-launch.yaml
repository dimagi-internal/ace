# Drive a freshly Learn-completed opportunity from the certificate
# screen through the Download Delivery gate into the Deliver-mode
# StandardHomeActivity. The post-Learn-pass mirror image of
# `learn-launch.yaml`.
#
# Pre-state: Final Learn-assessment passed AND synced to Connect. The
# user has navigated back to Connect's opp list and tapped `Resume` on
# the In-Progress card. Device is sitting on the certificate screen
# (atlas § 8): "Congratulations, <user>! You have successfully
# completed the Learn modules for <opp>." with a centered, full-width
# `VIEW OPPORTUNITY DETAILS` button.
#
# Post-state: Deliver-mode `StandardHomeActivity` (atlas § 10) with
# `id/viewJobCard` widget visible — the load-bearing differentiator
# vs Learn home (§ 5). The 4-tile grid (Start, View Job Status,
# Sync with Server, Log out of CommCare) is structurally identical
# to Learn mode; the project-card widget is what disambiguates.
#
# Atlas reference: docs/mobile-atlas/connect-2.62.0.md §§ 8, 9, 10.
#
# RESOURCE-ID STATUS (2026-05-26 — Deliver-side atlas verified live
# against bednet-spot-check run 20260526-1556's J2 dumps):
# - § 8 certificate / opp-detail: `connect_learning_button` is the
#   VIEW OPPORTUNITY DETAILS button; `connect_learning_certificate_container`
#   is the certificate section (it's a section within the opp-detail
#   screen, NOT a separate screen as previously assumed). Both ID-anchored
#   via ${SELECTOR:deliver-opp-detail-view-button} and
#   ${SELECTOR:deliver-certificate-container}.
# - § 9 Download Delivery gate: `connect_delivery_button` is the DOWNLOAD
#   button; `connect_delivery_title` is the "Delivery Details" heading.
#   Both ID-anchored via ${SELECTOR:deliver-download-button} and
#   ${SELECTOR:deliver-details-title}. No more coordinate fallbacks.
# - § 10 Deliver-mode StandardHomeActivity: `viewJobCard` is the load-
#   bearing differentiator (present in Deliver, absent in Learn).
#   ID-anchored via ${SELECTOR:deliver-home-job-card}.
#
# Pre-claim contract: the FLW MUST have completed all Learn modules +
# the final assessment AND synced to Connect before this palette is
# entered. Connect's UI does not surface the certificate screen until
# the assessment-pass syncs (atlas § 8 Open Questions). Calling this
# palette before sync completes will time out on the
# `Congratulations` anchor.
#
# RETRY-PROOFING (#747): when the Deliver CCZ was already downloaded by
# a prior dispatch on the same (test user, opportunity) — the standard
# state after ANY Phase 6 retry whose first attempt got past the
# download — Connect routes Resume DIRECTLY into the Deliver-mode app:
# either the StandardHomeActivity (job card visible) or the suite menu
# (`screen_suite_menu_list`, observed live on
# bednet-spot-check/20260609-0909 retry: ui dump
# `6-qa-and-training/screenshots/journey-deliver/00-postlearn-landing.xml`,
# Drive 1dX0qOlxzxVLyYWFrMMYO30U4gwDeKEqJ). The § 9 Download Delivery
# gate never renders on that path, so the download sequence below is
# guarded on `notVisible: deliver-home-job-card` instead of running
# unconditionally — the Deliver-side sibling of connect-claim-opp's
# already-Learn-complete branch (#568/#570).
#
# Live-validation status: the already-installed step shapes were walked
# end-to-end live on the 20260609-0909 retry (continuation recipe with
# identical anchors: suite menu → form walk → submit + sync confirmed);
# the guarded-branch ORDERING in this file is statically validated
# (palette health + sanity probe) but has not yet run on-device as a
# single file — exercise on the next Phase 6 retry.

appId: org.commcare.dalvik
---

# --- Already-installed fast path (#747) ----------------------------
# Resume landed in the Deliver suite menu (prior dispatch consumed the
# download gate). One back-press returns to StandardHomeActivity, which
# is this palette's contracted post-state; the converging job-card
# assert at the bottom still verifies it. If this fires on a Learn-side
# suite menu (precondition violation), back lands on the Learn home,
# the job-card assert fails, and the recipe halts loud — same failure
# the unconditional download wait produced, but for the right reason.
- runFlow:
    when:
      visible:
        ${SELECTOR:deliver-suite-menu}
    commands:
      - takeScreenshot: "deliver-launch-already-installed-suite"
      - back
# Resume landed directly on the Deliver home — nothing to do; record it.
- runFlow:
    when:
      visible:
        ${SELECTOR:deliver-home-job-card}
    commands:
      - takeScreenshot: "deliver-launch-already-installed-home"

# Resume from Connect's opp-list post-Learn-pass can land us on EITHER
# of two screens on Connect 2.62.0 depending on persisted state:
#
#   (A) § 8 certificate screen — the documented "Congratulations, <user>!
#       You have successfully completed the Learn modules for <opp>"
#       overlay with a `VIEW OPPORTUNITY DETAILS` button. The atlas-
#       documented path.
#
#   (B) Opp-detail directly — `connect_learning_button` ("VIEW
#       OPPORTUNITY DETAILS" / "DOWNLOAD LEARN APP" depending on state)
#       is the rendered button; no certificate text. Observed on
#       Connect 2.62.0 (bednet-spot-check/20260525-2022 Phase 6) —
#       the certificate is either auto-dismissed or skipped entirely
#       on resume-after-assessment-pass-sync. Same atlas § 8 transition
#       on the server side, different client-side surface.
#
# Both branches converge on the § 9 Download Delivery gate. The
# previous hard `extendedWaitUntil` on `Congratulations` text was
# strict-A-only; it timed out on path (B) and halted the recipe.
# Branch with `runFlow.when` so whichever surface is live, the right
# tap fires. The downstream `DOWNLOAD` + `viewJobCard` waits are
# common to both.
# Both branches converge on the § 9 Download Delivery gate. Each
# branch is ID-anchored via `connect_learning_button` (verified
# 2026-05-26 against bednet J2 dumps) — retryTapIfNoChange isn't
# needed on ID-anchored taps the way it was for the prior text-anchor.
- runFlow:
    when:
      visible:
        text: "Congratulations"
    commands:
      - takeScreenshot: "deliver-launch-certificate"
      - tapOn:
          ${SELECTOR:deliver-opp-detail-view-button}
- runFlow:
    when:
      visible:
        ${SELECTOR:deliver-opp-detail-view-button}
    commands:
      - takeScreenshot: "deliver-launch-opp-detail"
      - tapOn:
          ${SELECTOR:deliver-opp-detail-view-button}

# Settle gate for the already-installed path: after the back-press (or
# a direct home landing) the job card renders within a beat; bound the
# transition so the `notVisible` guard below can't fire mid-animation
# and re-create the 30s download-wait halt it exists to prevent (#747).
# On the fresh-install path this costs one 5s timeout and falls through.
- extendedWaitUntil:
    visible:
      ${SELECTOR:deliver-home-job-card}
    timeout: 5000
    optional: true

# § 9 Download Delivery gate — ID-anchored on the DOWNLOAD button
# (bednet-spot-check J2 dumps 2026-05-26 verified
# `connect_delivery_button` = "DOWNLOAD"). Guarded (#747): runs only
# when we are NOT already in the Deliver-mode home — on the
# already-installed retry path the gate never renders and an
# unconditional wait halts the recipe. If neither the cert/opp-detail
# branches nor the already-installed branches fired (precondition
# violation: Learn not yet completed-and-synced), this guard enters,
# the wait times out, and the recipe halts loud — unchanged behavior.
- runFlow:
    when:
      notVisible:
        ${SELECTOR:deliver-home-job-card}
    commands:
      - extendedWaitUntil:
          visible:
            ${SELECTOR:deliver-download-button}
          timeout: 30000
      - takeScreenshot: "deliver-launch-download-gate"
      - tapOn:
          ${SELECTOR:deliver-download-button}

# Deliver CCZ install progress — typically the same `Step N of M`
# progress UI as the Learn-side § 4 download (atlas § 9 notes this
# is unconfirmed; visually identical, selectors not yet dumped).
# Allow a generous timeout for the CCZ download + install on
# limited-bandwidth dev networks. `optional: true` (#772) so a download
# FAILURE falls through to the transient-server-connectivity branch
# below (and the converging job-card assert at the bottom) instead of a
# bare, uncharacterized 180s halt.
- extendedWaitUntil:
    visible:
      ${SELECTOR:deliver-home-job-card}
    timeout: 180000
    optional: true

# #772 — transient server-connectivity download failure. The async
# Deliver-CCZ download can fail on a flaky backend ("Couldn't connect to
# the server"), which de-auths the app to the PersonalID re-login screen
# (`connect_login_button` = "LOGIN WITH PERSONALID"). If the job-card
# wait above fell through to that surface, capture a CLASSIFIED forensic
# screenshot so the leg reads as a transient download drop rather than an
# uncharacterized 180s timeout. This is downstream of ACE — the released
# CCZ already passed Phase 3's `commcare-cli play` install gate, so it is
# NOT a recipe/selector/marker defect. Operator response (Step-5
# failure-mode table): re-attempt via /ace:qa-deep once backend
# connectivity is stable; do NOT cold-boot — the post-Learn state is
# fragile (#618/#629) and a boot resets the device PIN.
# STATICALLY VALIDATED ONLY: the transient error path is not reproducible
# on demand; exercise live the next time a Deliver download fails on a
# flaky backend.
- runFlow:
    when:
      visible:
        ${SELECTOR:personalid-login-button}
    commands:
      - takeScreenshot: "deliver-launch-download-server-error"

- takeScreenshot: "deliver-launch-home"

# Verify we landed in Deliver mode, not back in Learn. `viewJobCard`
# is absent on the Learn home (§ 5) and present on the Deliver home
# (§ 10) — this assertion is structural, not text-based, so it's the
# most reliable "we're in Deliver" check.
- assertVisible:
    ${SELECTOR:deliver-home-job-card}
