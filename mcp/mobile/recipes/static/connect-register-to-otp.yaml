# Drive CommCare Android (which integrates Connect/PersonalID as of 2.62.0)
# from a fresh install through to the OTP entry screen. The flow is:
#
#   1. Launch CommCare → "Welcome to CommCare" setup screen
#   2. Open nav drawer (top-left burger)
#   3. Tap "Sign In / Register" (nav_drawer_sign_in_button)
#   4. PersonalIdActivity opens with phone entry form
#   5. Fill country code, phone, accept consent, continue
#
# Selectors discovered against CommCare 2.62.0 on 2026-04-29 via uiautomator
# dump. Stops at the OTP entry screen — composite caller fetches OTP via
# Playwright and continues with connect-register-from-otp.yaml.
#
# OTP-entry-screen selector (REPLACE_otp_entry) still needs final discovery.
# Per Dimagi, +7426 is supposed to bypass OTP entirely — confirm this by
# advancing past the continue button against a real Connect-id backend.
#
# Known Maestro environmental gotcha (2026-04-29): the AVD created via
# `system-images;android-34;google_apis;arm64-v8a` includes Google Play
# Services, which surfaces a phone-number-hint bottom sheet on focus of
# the connect_primary_phone_input AutoCompleteTextView. The sheet absorbs
# subsequent inputText events, breaking the eraseText/inputText pattern.
# Fix is one of:
#   1. Use a non-GMS AVD: `sdkmanager "system-images;android-34;default;arm64-v8a"`
#      then create AVD with `avdmanager create avd -n ACE_Pixel_API_34_nogms ...`
#   2. ADB clipboard paste in place of Maestro inputText for the phone field.
# Until either lands, register_test_user composite cannot complete on a stock
# `google_apis` AVD — register the test user manually via maestro studio or
# direct touch as a one-time setup.
appId: org.commcare.dalvik
---
- launchApp:
    appId: org.commcare.dalvik
    clearState: true

- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/str_setup_message"
    timeout: 30000

# Open the navigation drawer (top-left burger icon) and tap Sign In / Register.
- tapOn:
    point: "73,209"
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/nav_drawer_sign_in_button"
    timeout: 5000
- tapOn:
    id: "org.commcare.dalvik:id/nav_drawer_sign_in_button"

# PersonalIdActivity — phone entry form.
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/connect_primary_phone_input"
    timeout: 10000

# Google Play Services' phone-number hint sheet ("Choose a phone number")
# auto-pops when the AutoCompleteTextView gains focus. It's a system overlay
# not visible to Maestro's view tree, so a runFlow.when conditional doesn't
# fire. Dismiss it unconditionally with a BACK key after each focus event.
- tapOn:
    id: "org.commcare.dalvik:id/countryCode"
- pressKey: Back
- tapOn:
    id: "org.commcare.dalvik:id/countryCode"
- eraseText: 10
- inputText: ${COUNTRY_CODE}
- hideKeyboard

- tapOn:
    id: "org.commcare.dalvik:id/connect_primary_phone_input"
- pressKey: Back
- tapOn:
    id: "org.commcare.dalvik:id/connect_primary_phone_input"
- eraseText: 15
- inputText: ${PHONE_LOCAL}
- hideKeyboard

- tapOn:
    id: "org.commcare.dalvik:id/connect_consent_check"

# If the phone is already registered, surface a sentinel for the composite
# caller. The dialog text is best-effort; we'll refine this once we observe
# the actual duplicate-phone flow against the +7426 backend.
- runFlow:
    when:
      visible:
        text: "already registered"
    commands:
      - evalScript: ${output.stdout = 'PHONE_ALREADY_REGISTERED'}
      - stopApp

- tapOn:
    id: "org.commcare.dalvik:id/personalid_phone_continue_button"

# OTP entry screen — final selector still REPLACE_otp_entry pending live run.
- extendedWaitUntil:
    visible:
      id: "REPLACE_otp_entry"
    timeout: 15000
