# Tap a specific module or form on the Learn-app's MenuActivity surface,
# advancing one level deeper into the suite tree.
#
# Pre-state: MenuActivity showing `screen_suite_menu_list` (either the
# suite root from learn-launch.yaml, OR a drilled-in form list inside
# a module). Atlas §6.
#
# Post-state: depends on what was tapped:
#   - Tapping a suite-root row → drills into a form-list MenuActivity.
#   - Tapping a form row in a form list → launches FormEntryActivity for
#     that form (atlas §7).
#
# CommCare's "auto-skip into only form" behavior: when a module contains
# exactly one form AND the form's display name DIFFERS from the module
# name, CommCare suppresses the intermediate one-row form-list and
# launches the form directly (FormEntryActivity, `nav_btn_next` visible).
# When module name == form name, CommCare suppresses the auto-skip — the
# device sits on the intermediate `screen_suite_menu_list` showing one
# row labeled identically to the action bar. (Live observed turmeric run
# 2026-05-15: Modules 4-7 of the Learn app use module-name == form-name;
# Module 4's halt at `tapOn nav_btn_next` is the canonical reproducer.)
# This recipe probes-then-taps to handle both cases under one contract.
#
# Parameters:
#   ${MODULE_NAME} — the visible label of the row to tap (e.g.,
#                    "Photo standardization", "Final assessment", or the
#                    app's name for the suite-root row). The
#                    `learn-suite-row-by-name` selector is itself a
#                    text-anchor matcher that uses ${MODULE_NAME}, so
#                    Maestro walks up from the matched TextView to the
#                    clickable LinearLayout parent (the row container).
#
# Naming note: the recipe is called `learn-tap-module` for historical
# reasons (the original recipe assumed a flat module list). With the
# atlas-corrected suite-tree understanding, the same recipe drills any
# level of the tree — module OR form — by row text. The "module"
# wording in this name is retained to avoid churning all callers; the
# recipe itself is structurally generic.
appId: org.commcare.dalvik
---
- extendedWaitUntil:
    visible:
      id: "org.commcare.dalvik:id/screen_suite_menu_list"
    timeout: 10000
- takeScreenshot: "learn-tap-module-before-${MODULE_NAME}"

# Maestro walks up from the matched `row_txt` TextView (not clickable)
# to the row's parent LinearLayout (which IS clickable). No need for
# `below:` scoping — rows in this ListView don't overlap horizontally,
# so a text match disambiguates the row uniquely.
- tapOn:
    ${SELECTOR:learn-suite-row-by-name}

- waitForAnimationToEnd:
    timeout: 5000

# Branch on what landed:
#   A. `nav_btn_next` already visible → CommCare auto-skipped past the
#      intermediate one-row form-list directly into the form (the common
#      case when module-name != form-name). No further action needed —
#      downstream `form-advance.yaml` takes over.
#   B. `screen_suite_menu_list` still visible AND `nav_btn_next` NOT
#      visible AND a row matching `${MODULE_NAME}` is rendered inside
#      the menu-list body → CommCare suppressed the auto-skip because
#      module-name == form-name. Device is sitting on the intermediate
#      one-row form-list; the form row carries text:${MODULE_NAME}
#      (since the form shares the module's name) — tap it to enter the
#      form, then assert `nav_btn_next` visible so any further halt is
#      fast and named.
#
#      The `below: id: screen_suite_menu_list` scoping on the visible-
#      text guard is load-bearing: when form-name != module-name (e.g.
#      malaria-itn-fgd J1: module "Briefing Acknowledgement" → form
#      "Acknowledge Readiness"), the form row's text does NOT match
#      `${MODULE_NAME}`, so the guard fails and Branch B skips — letting
#      the caller's next learn-tap-module invocation (with FORM_NAME)
#      drill the form row by its own label. Without the body scoping,
#      Branch B's bare `visible: text: ${MODULE_NAME}` would match the
#      toolbar title (which still reads "Briefing Acknowledgement" on
#      the form-list screen), the re-tap would land on the non-tappable
#      toolbar, and the extendedWaitUntil would expire on the unchanged
#      form-list. Live-reproduced 2026-05-19 (malaria-itn-fgd
#      20260515-1645 Phase 6 attempt 12) — see screenshot
#      ❌-1779218294468-(chunk-0.yaml).png.
#
#   Otherwise (drilling from suite-root into a form-LIST whose form
#   name != module name, neither branch fires): the recipe falls
#   through with the form-list still visible — caller is expected to
#   invoke learn-tap-module again with the form's row name. This
#   preserves the existing two-call drill pattern used by J1-style
#   palettes.
# Outer guard: intermediate form-list still visible (auto-skip
# suppressed). Inner guard: same-name case specifically — a row
# matching `${MODULE_NAME}` is rendered inside the menu-list body.
# Nested rather than a single `when:` because Maestro `when:` clauses
# take ONE `visible:` element selector; expressing "form-list visible
# AND text-in-list-body visible" requires two predicates, which YAML
# only supports as a nested flow.
- runFlow:
    when:
      visible:
        id: "org.commcare.dalvik:id/screen_suite_menu_list"
      notVisible:
        id: "org.commcare.dalvik:id/nav_btn_next"
    commands:
      - runFlow:
          when:
            # Same-name-only guard: the text-match is scoped to the
            # list body so the toolbar title (which still reads
            # ${MODULE_NAME} on the form-list screen even when the
            # form has a different label) does NOT satisfy this
            # clause. See header comment for full rationale.
            visible:
              text: "${MODULE_NAME}"
              below:
                id: "org.commcare.dalvik:id/screen_suite_menu_list"
          commands:
            - takeScreenshot: "learn-tap-module-intermediate-${MODULE_NAME}"
            - tapOn:
                ${SELECTOR:learn-suite-row-by-name}
            - waitForAnimationToEnd:
                timeout: 5000
            - extendedWaitUntil:
                visible:
                  id: "org.commcare.dalvik:id/nav_btn_next"
                timeout: 10000

- takeScreenshot: "learn-tap-module-after-${MODULE_NAME}"
