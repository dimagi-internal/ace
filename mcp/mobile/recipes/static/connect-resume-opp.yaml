# Navigate Connect's opp list to the target opp's In-Progress card and
# tap its CTA (Resume OR Proceed), landing on the post-Learn
# certificate/opp-detail surface (atlas § 8) that deliver-launch.yaml consumes.
#
# Pre-state: Connect opp-list (connect_fragment_jobs_list) visible;
# the target opp is in the "In Progress" section. Warm-session only —
# assumes the journey-learn leg just completed Learn in this dispatch.
#
# Post-state: the certificate/opp-detail surface (atlas § 8):
# either the "Congratulations" certificate overlay or the
# connect_learning_button ("VIEW OPPORTUNITY DETAILS") on the opp-detail
# screen — whichever Connect renders after the CTA tap. deliver-launch.yaml
# handles both variants and drives forward from here.
#
# Required env vars (pass via mobile_run_recipe.envVars):
#   OPP_RUN_ID — the run-id (YYYYMMDD-HHMM) of the current run; the
#                recipe anchors the target-tile match on this short,
#                line-1, unique token (see
#                skills/app-screenshot-capture/SKILL.md § OPP_RUN_ID
#                matcher). Phase 4 `connect-opp-setup` front-prefixes the
#                opp name with this run-id (`"<run_id> · <display>"`), so
#                it lands on the tile's first line and never clips —
#                making the resume deterministic among the test user's
#                accumulated invites. The recipe matches it as
#                `text: ".*${OPP_RUN_ID}.*"` (Maestro `text:` is a
#                FULL-match regex; the `.*` wrappers substring-match the
#                run-id within the longer tile label). Same contract as
#                connect-claim-opp.yaml. Pass verbatim from
#                `run_state.yaml.run_id`.
#   OPP_NAME   — display name of the opportunity (verbatim from
#                run_state.yaml.phases.connect-setup.products.connect.opportunity.name).
#                Retained for screenshots / logging context ONLY — it is
#                NOT the matcher anymore (the matcher is OPP_RUN_ID).
#
# SELECTOR STATUS — card list dump-confirmed live on ACE_Pixel_API_34,
# CommCare 2.63.0, 2026-05-31 (jjackson/ace#591):
#   - Each opp tile is one `rootCardView`; its inner (unnamed) ViewGroup
#     holds `tvTitle` + the CTA button (`btn_resume`) + `btn_view_info` as
#     SIBLING direct children. (The secondary button is `btn_view_info`,
#     NOT `btn_view_opportunity`.)
#   - A Learn-IN-PROGRESS card shows `btn_resume` (text "Resume").
#   - A Learn-100%-COMPLETE card shows a "Proceed" CTA instead (jjackson/ace#591
#     screenshot evidence). Its resource-id was NOT dump-confirmable this
#     session (no Learn-complete opp on the calibration device), so the
#     Proceed branch matches by its text label — which is fine because the
#     tap is card-scoped (see below) and therefore leak-proof regardless.
#
# WHY card-scoping (the #591 fix): the prior recipe tapped
# `id: btn_resume, below: text: ${OPP_NAME}` — which matches the FIRST
# btn_resume in DOCUMENT ORDER below the title. On a Learn-complete target
# (whose own CTA is "Proceed", not "Resume") this leaked to a LATER tile's
# Resume button and resumed the WRONG opp. The fix scopes every CTA tap to
# the card whose subtree directly contains the run-id token via
# `childOf: { containsChild: { text: ".*${OPP_RUN_ID}.*" } }`. Validated live: this
# selector resolves to exactly the target card's button. `containsChild` is
# DIRECT-child only, which is why it pins to the inner ViewGroup (title +
# button siblings) and not the outer rootCardView/RecyclerView.
appId: org.commcare.dalvik
---
# --- #618 inter-leg handoff (Learn home -> Connect jobs list) — CHARACTERIZED + HEALED (#711)
# The journey-learn leg can leave the device on the CommCare Learn-app home
# (nsv_home_screen / StandardHomeActivity) instead of Connect's jobs list. The
# post-Learn end-state is NONDETERMINISTIC — sometimes the jobs list (the assert
# below passes directly), sometimes the Learn home.
#
# The back-nav was CAPTURED LIVE on ACE_Pixel_API_34 / CommCare 2.63.0
# (bednet-spot-check/20260605-0658, jjackson/ace#711) following the discipline:
# capture → candidate tap → re-dump → confirm. The route: open the top-left
# nav drawer (burger), tap the "Opportunities" row (a list_title TextView inside
# nav_drawer_recycler) → lands on connect_fragment_jobs_list. The prior
# `pressKey: back` dead-end (it exits CommCare to the Android launcher) is NOT
# used.
#
# The heal below is GUARDED on `notVisible: home-jobs-list`, so it no-ops on the
# runs that already landed on the jobs list (the nondeterministic case) and only
# opens the drawer when we're on the Learn home. After it routes (or if already
# landed), the assert confirms the pre-state connect-resume-opp consumes.
- runFlow:
    when:
      notVisible:
        id: "${SELECTOR:home-jobs-list}"
    commands:
      # Top-left nav-drawer toggle. Coordinate-based (the burger image has no
      # resource-id) — same point as nav-drawer-burger-point / connect-login.
      - tapOn:
          point: "73,209"
      - waitForAnimationToEnd:
          timeout: 3000
      - tapOn:
          text: "${SELECTOR:nav-drawer-opportunities}"
      - extendedWaitUntil:
          visible:
            id: "${SELECTOR:home-jobs-list}"
          timeout: 15000

# Confirm we are on the opp-list (passes directly when already there, or after
# the #711 heal branch above routes here from the Learn home).
- assertVisible:
    id: "${SELECTOR:home-jobs-list}"

# Scroll the target opp's In-Progress card into the viewport.
# `visibilityPercentage: 60` tolerates multi-line title-wrap (same
# reasoning as connect-claim-opp.yaml).
- scrollUntilVisible:
    element:
      text: ".*${OPP_RUN_ID}.*"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 60
- assertVisible:
    text: ".*${OPP_RUN_ID}.*"

- takeScreenshot: "connect-resume-opp-tile"

# Tap the target card's CTA, STRICTLY scoped to the card whose subtree
# directly contains the run-id token (`.*${OPP_RUN_ID}.*`). Two label variants depending on Learn
# state; whichever is present in THIS card is tapped. Maestro auto-scrolls
# the tap target into view, so no separate button-scroll step is needed.
#
# Branch A — Learn in progress: the card's CTA is `btn_resume`.
- runFlow:
    when:
      visible:
        id: "${SELECTOR:opp-list-resume-button}"
        childOf:
          containsChild:
            text: ".*${OPP_RUN_ID}.*"
    commands:
      - tapOn:
          id: "${SELECTOR:opp-list-resume-button}"
          childOf:
            containsChild:
              text: ".*${OPP_RUN_ID}.*"
          retryTapIfNoChange: true

# Branch B — Learn complete: the card's CTA is the "Proceed" button
# (resource-id not yet dump-confirmed; matched by label, card-scoped).
# Guard is POSITIVE ("Proceed" present in the target card), NOT
# "btn_resume not visible" — otherwise, after Branch A taps Resume and
# navigates away, a "btn_resume not visible" guard would become true and
# this branch would wrongly fire (caught live 2026-05-31). Only one CTA
# label is present per card, so the two positive guards are mutually
# exclusive, and after either taps + navigates, neither re-fires.
- runFlow:
    when:
      visible:
        text: "Proceed"
        childOf:
          containsChild:
            text: ".*${OPP_RUN_ID}.*"
    commands:
      - tapOn:
          text: "Proceed"
          childOf:
            containsChild:
              text: ".*${OPP_RUN_ID}.*"
          retryTapIfNoChange: true

# FAIL LOUD (#591): a correct CTA tap leaves the jobs list. If we are still
# on connect_fragment_jobs_list, the tap was a no-op or hit the wrong
# surface — halt here with a named failure instead of silently proceeding
# into the wrong opp's app (the exact silent wrong-opp resume #591 reported).
- extendedWaitUntil:
    notVisible:
      id: "${SELECTOR:home-jobs-list}"
    timeout: 10000

# Post-CTA: Connect surfaces either the certificate screen (atlas § 8)
# or the opp-detail screen with connect_learning_button. Both are the
# correct pre-state for deliver-launch.yaml.
- takeScreenshot: "connect-resume-opp-landed"
