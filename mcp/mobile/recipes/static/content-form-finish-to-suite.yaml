# Score-gated two-screen FINISH (#569): result/congratulations screen
# shows nav_btn_finish (not nav_btn_next). Press FINISH to submit + sync.
- runFlow:
    when:
      visible:
        id: "${SELECTOR:form-nav-finish}"
      notVisible:
        id: "${SELECTOR:learn-suite-menu}"
    commands:
      - tapOn:
          id: "${SELECTOR:form-nav-finish}"
      - extendedWaitUntil:
          visible:
            text: ".*form.*sent to server.*"
          timeout: 15000
      - waitForAnimationToEnd:
          timeout: 3000
- extendedWaitUntil:
    visible:
      id: "${SELECTOR:learn-suite-menu}"
    timeout: 15000
- takeScreenshot: "${SCREENSHOT_NAME}"
