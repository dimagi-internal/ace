name: "turmeric-prospective-llo-walkthrough"
narrative: >
  Show a prospective LLO what running the Turmeric Market Survey looks like end-to-end:
  data quality from 5 FLWs across 5 Nairobi markets, the weekly review that catches
  Dinesh in week 2, the coaching loop that lifts him 18pp by week 4, and the audit
  workflow that verifies the LLO is actually closing those loops.
base_url: "https://labs.connect.dimagi.com"

auth:
  type: command
  check: "test -f ~/.ace/labs-session.json"
  login: "bash ~/.claude/plugins/cache/ace/ace/$(cat ~/.claude/plugins/marketplaces/ace/VERSION)/bin/ace-labs-walkthrough-login"

personas:
  prospective-llo:
    name: "Naima Otieno"
    role: "Operations Lead — prospective LLO evaluating ACE for a Nairobi-market deployment"
    color: "#2563eb"
    intro: >
      I've run FLW programs across East African markets before. I want to see what
      day-to-day looks like for my supervisors — can the weekly review actually surface
      a struggling FLW early enough to help? And can a program admin tell whether I'm
      doing my job well?

scenes:
  - persona: prospective-llo
    title: "Opportunity headline — what the program looks like in labs"
    show: "/a/ai-demo-space/opportunity/1788/"
    impressive_because: >
      Lands on the Turmeric Market Survey opp page with 1,095 vendor visits across 5
      Nairobi markets and the 5 named FLW cohort visible at the top.
    ai_quality: >
      Header must name the opportunity ("Turmeric Market Survey") and show a visit
      count at or above 1,000, with at least one named FLW visible above the fold.

  - persona: prospective-llo
    title: "LLO Weekly Review — KPI scorecard with named FLWs"
    show: "/labs/workflow/3061/"
    impressive_because: >
      Hero panel shows "1,095 visits · 87% photo-quality · 1 active coaching task · 5
      markets". Per-FLW rows show real names (Asha Mwangi, Bao Nguyen, Carla Ruiz,
      Dinesh Patel, Esi Kofi) with archetype pills and one-line narrative notes.
    ai_quality: >
      Page must render at least 4 named FLWs as story cards (not blank "user_001"
      placeholders), each with an archetype pill in a distinct color, and a hero
      panel above the table showing 3+ KPI tiles with concrete numbers.

  - persona: prospective-llo
    title: "Dinesh's struggle — anomaly badges on his row"
    show: "/labs/workflow/3061/"
    impressive_because: >
      Dinesh's card shows the 'struggling→improving' archetype pill plus TWO warn
      badges: "Shininess vs AI grader disagrees" and "Photos failing MTN-card check".
      The narrative note explains the recovery: "+18pp by week 4".
    ai_quality: >
      Dinesh row must show at least one red/yellow warn badge AND a narrative note
      explaining the coaching outcome (the words "coach", "lift", or "+18pp" must
      appear in or near his row).

  - persona: prospective-llo
    title: "Coaching loop visualization"
    show: "/labs/workflow/3061/"
    impressive_because: >
      Footer aside reads "Wk 2 · detected → Wk 2 · coaching task spawned → Wk 4 ·
      +18pp accuracy" as three colored pills in sequence. A real LLO sees the loop
      visually closed, not just a flat metric.
    ai_quality: >
      A coaching-arc visualization (timeline OR 3-pill sequence) must appear below
      or beside the FLW table with at minimum two of: "detected", "task", "Wk 4",
      "+18pp", "accuracy" visible.

  - persona: prospective-llo
    title: "Program admin audit — is the LLO actually closing loops?"
    show: "/labs/workflow/3064/"
    impressive_because: >
      Purple shield hero ("Are LLO weekly reviews actually closing the coaching
      loop?"). Two snapshot rows (Week 1, Week 2) with grade pills. The prospective
      LLO sees the meta-layer that a program admin would use to grade their work.
    ai_quality: >
      Page must show at least 2 snapshot rows AND a status pill per row (color-coded
      green/yellow/red) AND a description that mentions "audit" or "compliance" or
      "process" in the header area.
