# app-test-cases.yaml — bindings of Phase 1 journeys to Phase 3 built structure.
# Producer: app-test-cases (Phase 3)
# Consumers: app-screenshot-capture (Phase 6 shallow), /ace:qa-deep (manual deep)

opp: {{opp_name}}
run_id: {{run_id}}
generated_at: {{ISO}}
nova_apps:
  learn: {{learn_nova_app_id}}
  deliver: {{deliver_nova_app_id}}

# Each entry binds one Journey from expected-journeys.md to:
#   - the actual forms/fields it exercises (real IDs, not placeholders)
#   - a Maestro recipe filled with concrete selectors (no REPLACE_*)
#   - the structural pass criteria (boot, no crash, submit confirmation)
#
# `is_smoke: true` marks the recipe Phase 6 runs in shallow mode (one
# per app — the cheapest representative happy path).

# LAZY DEEP RECIPES (jjackson/ace#605): this catalog lists EVERY journey
# (smoke + deep), but Phase 3 authors recipe FILES only for the two
# `is_smoke: true` journeys. Each non-smoke (deep) journey carries
# `recipe: deferred` (the literal string) instead of a recipe_path — its
# recipe file is generated on demand by `/ace:qa-deep` the first time it
# runs, using the same composition rules in app-test-cases/SKILL.md.
# Phase 6 (shallow, in /ace:run) only walks the smokes, so deep recipes
# would be wasted work up front.
#
# recipe convention:
#   - is_smoke:true journeys: `recipe_path: 3-commcare/recipes/journey-<app>.yaml`
#     (the single smoke per app uses the bare name — journey-learn.yaml /
#     journey-deliver.yaml — and the file is authored at Phase 3)
#   - deep (is_smoke:false) journeys: `recipe: deferred` (no file at Phase 3;
#     /ace:qa-deep generates 3-commcare/recipes/journey-<app>-<slug>.yaml on
#     demand and flips `recipe:` from `deferred` to that path)
# Journey `id` is a `journey-`-prefixed, intent-derived kebab-case slug,
# unique per opp — id = journey-<app>-<intent>, always starting with the
# literal `journey-` prefix. e.g. journey-learn-pass,
# journey-learn-retry, journey-deliver-submit, journey-deliver-alt-answer,
# journey-deliver-multiple, journey-deliver-locked. NOT a
# cryptic J<n> ordinal. NOTE: the recipe_path filenames are NOT prefixed
# again (smokes use the bare journey-learn.yaml / journey-deliver.yaml) —
# filename and id share the journey- prefix but are otherwise distinct.
# See skills/app-test-cases/SKILL.md § Journey id convention.
journeys:
  # The Learn smoke walks Learn to COMPLETION (all modules + final
  # assessment) — this both captures Learn screenshots AND unlocks the
  # Deliver app (Connect gates Deliver behind Learn-assessment
  # completion). recipe_path uses the bare smoke name journey-learn.yaml.
  - id: learn-happy-path
    name: {{journey_name from expected-journeys.md}}
    app: learn
    is_smoke: true   # exactly one is_smoke:true journey per app
    forms_exercised:
      - {{form_id_or_name}}
    fields_exercised:
      - {{field_id}}
    recipe_path: 3-commcare/recipes/journey-learn.yaml
    structural_pass_criteria:
      - app_boots
      - no_crash
      - assessment_complete
    pdd_time_budget_seconds: {{from PDD if specified, else null}}

  # The Deliver smoke RESUMES from the Learn-completed state — it does
  # NOT re-walk Learn (the journey-learn leg, run first in the same
  # dispatch, already unlocked Deliver). Compose it as:
  #   connect-resume-opp.yaml -> deliver-launch.yaml -> first Deliver form.
  # Warm-session only; not independently cold-runnable. See
  # skills/app-test-cases/SKILL.md § Step 2 "Deliver-smoke composition".
  - id: deliver-yes
    name: {{journey_name from expected-journeys.md}}
    app: deliver
    is_smoke: true   # exactly one is_smoke:true journey per app
    forms_exercised:
      - {{form_id_or_name}}
    fields_exercised:
      - {{field_id}}
    recipe_path: 3-commcare/recipes/journey-deliver.yaml
    structural_pass_criteria:
      - app_boots
      - no_crash
      - submission_confirmed
    pdd_time_budget_seconds: {{from PDD if specified, else null}}

  # Deep (non-smoke) journeys: listed in the catalog, but recipe is DEFERRED.
  # No recipe file is authored at Phase 3 — /ace:qa-deep generates it on
  # demand (jjackson/ace#605). Emit one entry per deep journey from
  # expected-journeys.md, each with `recipe: deferred` (NOT a recipe_path).
  - id: deliver-no
    name: {{a negative/ineligible-visit journey from expected-journeys.md}}
    app: deliver
    is_smoke: false
    forms_exercised:
      - {{form_id_or_name}}
    fields_exercised:
      - {{field_id}}
    recipe: deferred   # generated on demand by /ace:qa-deep — no Phase 3 file
    structural_pass_criteria:
      - app_boots
      - no_crash
      - submission_confirmed
    pdd_time_budget_seconds: {{from PDD if specified, else null}}
